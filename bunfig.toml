[test]
preload = ["./tests/setup/bun-dom.ts"]
# Global floors live in scripts/ci/check-bun-coverage.ts. Bun 1.3.14 applies
# its built-in scalar threshold per loaded file, which cannot express a global
# repository floor without excluding partially exercised product files.
coverageReporter = ["lcov"]
coverageDir = "artifacts/bun-coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "tests/**", # Test-only helpers and executable proof fixtures.
  "fixtures/**", # Test-only JSON and image fixture data.
  "src/@types/resources.d.ts", # Generated i18next resource declarations.
]
