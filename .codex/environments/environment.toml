# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "RawEngine"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

PRIMARY_ROOT="/Users/cgas/Documents/RawEngine/RapidRaw"
CURRENT_ROOT="$(git rev-parse --show-toplevel)"
TARGET_BRANCH="main"

echo "Primary RawEngine checkout: $PRIMARY_ROOT"
echo "Current Codex worktree: $CURRENT_ROOT"

git fetch origin "$TARGET_BRANCH" --prune

if ! git diff --quiet --ignore-submodules --exit-code || \
  ! git diff --cached --quiet --ignore-submodules --exit-code; then
  echo "Refusing to move worktree to origin/$TARGET_BRANCH because tracked changes exist." >&2
  exit 1
fi

git checkout --detach "origin/$TARGET_BRANCH"

if [ -d "$PRIMARY_ROOT/node_modules" ] && [ "$PRIMARY_ROOT" != "$CURRENT_ROOT" ] && [ ! -e "$CURRENT_ROOT/node_modules" ]; then
  ln -s "$PRIMARY_ROOT/node_modules" "$CURRENT_ROOT/node_modules"
  echo "Linked node_modules from primary checkout."
else
  echo "Installing Bun dependencies..."
  bun install --frozen-lockfile
fi

echo "Fetching Rust dependencies, including git-based Cargo dependencies..."
cargo fetch --locked --manifest-path src-tauri/Cargo.toml

echo "Configuring repository hooks and GitHub resolution..."
git config core.hooksPath .githooks
git config pull.ff only
git config remote.pushDefault origin
bun run check:gh-repo-resolution || bun run repo:fix-gh-resolution

echo "RawEngine Codex environment setup complete."
'''

[[actions]]
name = "dev"
icon = "run"
command = "bun run dev"

[[actions]]
name = "check quick"
icon = "test"
command = "bun run check:quick"

[[actions]]
name = "format check"
icon = "check"
command = "bun run format:check"
