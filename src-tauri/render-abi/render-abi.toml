# RapidRaw render ABI manifest v1.
#
# This file owns the stable resource identities used by the main adjustment
# storage buffer. Processing equations remain handwritten in Rust/WGSL.
schema_version = 1
layout_version = 2
max_mask_bindings = 1

[bindings.main]
input_texture = 0
output_texture = 1
adjustments = 2
mask_textures = 3
lut_texture = 4
lut_sampler = 5
sharpness_blur = 6
tonal_blur = 7
clarity_blur = 8
structure_blur = 9
dehaze_blur = 10
flare_texture = 11
flare_sampler = 12

[structs.all_adjustments]
rust = "AllAdjustments"
wgsl = "AllAdjustments"
fields = ["global", "mask_adjustments", "mask_count", "tile_offset_x", "tile_offset_y", "mask_atlas_cols", "blur_pass_flags", "execution_phase", "source_width", "source_height"]

[structs.global_adjustments]
rust = "GlobalAdjustments"
wgsl = "GlobalAdjustments"
fields = ["exposure", "brightness", "contrast", "highlights", "shadows", "whites", "blacks", "saturation", "temperature", "tint", "vibrance", "hue", "edit_graph_version", "dehaze_atmosphere_r", "dehaze_atmosphere_g", "dehaze_atmosphere_b", "technical_white_balance", "sharpness", "luma_noise_reduction", "color_noise_reduction", "clarity", "dehaze", "structure", "centre", "vignette_amount", "vignette_midpoint", "vignette_roundness", "vignette_feather", "grain_amount", "grain_size", "grain_roughness", "chromatic_aberration_red_cyan", "chromatic_aberration_blue_yellow", "show_clipping", "is_raw_image", "dehaze_atmosphere_confidence", "has_lut", "lut_intensity", "tonemapper_mode", "_pad_lut2", "_pad_lut3", "_pad_lut4", "_pad_lut5", "_pad_agx1", "_pad_agx2", "_pad_agx3", "agx_pipe_to_rendering_matrix", "agx_rendering_to_pipe_matrix", "rapid_view_parameters0", "rapid_view_parameters1", "rapid_view_parameters2", "_pad_cg1", "_pad_cg2", "_pad_cg3", "_pad_cg4", "color_grading_shadows", "color_grading_midtones", "color_grading_highlights", "color_grading_global", "color_grading_blending", "color_grading_balance", "_pad2", "_pad3", "color_calibration", "color_balance_rgb", "channel_mixer", "black_white_mixer", "levels", "hsl", "luma_curve", "red_curve", "green_curve", "blue_curve", "luma_curve_count", "red_curve_count", "green_curve_count", "blue_curve_count", "_pad_end1", "_pad_end2", "_pad_end3", "_pad_end4", "glow_amount", "halation_amount", "flare_amount", "sharpness_threshold", "tone_equalizer", "point_color", "perceptual_grading", "scene_curve_knots", "scene_curve_parameters", "output_curve_knots", "output_curve_parameters"]
