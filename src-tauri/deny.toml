[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "NCSA",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

exceptions = [
  { name = "jxl-encoder", allow = ["AGPL-3.0-only"] },
  { name = "jxl-encoder-simd", allow = ["AGPL-3.0-only"] },
  { name = "rawler", allow = ["LGPL-2.1"] },
]

private = { ignore = true }
