name: Setup Bun dependencies
description: Set up Bun, restore the Bun package cache, and install frontend dependencies.

inputs:
  node-version:
    description: Optional Node.js version to install before Bun.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Node.js
      if: ${{ inputs.node-version != '' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: package.json

    - name: Restore Bun package cache
      id: bun-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-bun-

    - name: Record Bun package cache status
      shell: bash
      run: |
        set -euo pipefail

        cache_hit="${{ steps.bun-cache.outputs.cache-hit }}"
        if [[ -z "$cache_hit" ]]; then
          cache_hit="miss"
        fi

        {
          echo "### Bun package cache"
          echo "- Exact hit: \`$cache_hit\`"
          echo "- Scope: \`${{ runner.os }}-${{ runner.arch }}\`"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Check Bun version
      shell: bash
      run: bun --version

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail

        cache_dir="${BUN_INSTALL_CACHE_DIR:-$HOME/.bun/install/cache}"

        for attempt in 1 2 3; do
          if bun install --frozen-lockfile; then
            exit 0
          fi

          status="$?"
          if [[ "$attempt" == "3" ]]; then
            exit "$status"
          fi

          if [[ -d "$cache_dir" ]]; then
            find "$cache_dir" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          fi

          sleep "$((attempt * 5))"
        done
