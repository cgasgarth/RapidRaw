name: GitHub Action Version Audit

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-action-pins:
    name: latest GitHub Action pins
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Check latest action pins
        run: bun scripts/check-github-action-pins.mjs --check-latest
