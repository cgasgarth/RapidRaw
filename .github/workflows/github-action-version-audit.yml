name: GitHub Action Version Audit

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-action-pins:
    name: latest GitHub Action pins
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'

      - name: Check latest action pins
        run: node scripts/check-github-action-pins.mjs --check-latest
