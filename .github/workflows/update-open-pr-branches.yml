name: Update open PR branches

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Agent source export
      - Performance Regression
      - PR Fast Validation
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: update-open-pr-branches
  cancel-in-progress: false

jobs:
  update:
    name: Refresh ready PR heads
    if: github.repository == 'cgasgarth/RapidRaw'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Merge main and dispatch required checks
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun scripts/ci/update-ready-pr-branches.ts
