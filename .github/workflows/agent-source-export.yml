name: Agent source export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Archive source
        run: git archive --format=zip --output=rapidraw-source.zip HEAD
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rapidraw-source
          path: rapidraw-source.zip
          if-no-files-found: error
          retention-days: 1
