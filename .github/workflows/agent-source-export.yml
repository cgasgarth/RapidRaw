name: Agent source export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive source
        run: git archive --format=zip --output=rapidraw-source.zip HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: rapidraw-source
          path: rapidraw-source.zip
          if-no-files-found: error
          retention-days: 1
