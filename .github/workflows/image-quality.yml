name: Image Quality Regression

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to validate.
        required: true
        default: main

permissions:
  contents: read

jobs:
  visual-smoke:
    name: visual smoke screenshot macOS
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun-deps

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Capture visual smoke screenshot
        run: bun scripts/proofs/capture-visual-smoke.ts

      - name: Upload visual smoke screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-smoke-screenshots
          path: artifacts/visual-smoke/*.png
          retention-days: 7
          if-no-files-found: error

  readiness:
    name: image quality readiness / ${{ matrix.lane }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: render-smoke
            anchor: 'validation(render): add golden render smoke command'
          - lane: fixture-manifest
            anchor: 'validation(fixtures): define fixture manifest schema'
          - lane: cpu-reference
            anchor: 'validation(reference): add CPU reference render smoke fixture'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Verify planned image-quality lane
        shell: bash
        run: |
          set -euo pipefail

          grep -Fq "#### Image Quality Regression" RAW_EDITOR_PLAN.md
          grep -Fq "${{ matrix.anchor }}" RAW_EDITOR_PLAN.md

          {
            echo "### Image quality readiness"
            echo "- Lane: \`${{ matrix.lane }}\`"
            echo "- Tracking anchor: \`${{ matrix.anchor }}\`"
            echo "- Status: topology scaffold only; this does not claim render-quality coverage yet."
            echo "- Promotion path: replace this readiness lane with a real command when the linked validation issue lands."
          } >> "$GITHUB_STEP_SUMMARY"
