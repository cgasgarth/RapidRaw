name: Dependency Version Audit

on:
  schedule:
    - cron: '43 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  javascript-dependency-versions:
    name: JavaScript dependency versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Audit JavaScript package versions
        run: bun scripts/checks/audit-dependency-versions.ts --ecosystem=js --format=markdown >> "$GITHUB_STEP_SUMMARY"

  rust-dependency-versions:
    name: Rust dependency versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Audit Rust crate versions
        run: bun scripts/checks/audit-dependency-versions.ts --ecosystem=rust --format=markdown >> "$GITHUB_STEP_SUMMARY"
