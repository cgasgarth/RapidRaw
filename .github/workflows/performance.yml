name: Performance Regression

on:
  pull_request:
    paths:
      - '.github/workflows/performance.yml'
      - 'scripts/perf/**'
      - 'scripts/qa/**'
      - 'src/components/panel/MainLibrary.tsx'
      - 'src/components/panel/editor/**'
      - 'src/utils/adjustmentSnapshots.ts'
      - 'tests/pure-ts/performance-lab*.test.ts'
  schedule:
    - cron: '17 8 * * 2'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to validate.
        required: true
        default: main
      baseline-history-path:
        description: Optional checked-out append-only baseline history JSON; when set, the trend gate is fail-closed.
        required: false
        default: ''

permissions:
  contents: read

jobs:
  performance-lab:
    name: performance lab / ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - editor.preview-scheduling
          - browser.editor-open
          - browser.editor-compare
          - browser.editor-crop
          - browser.library-open
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun-deps

      - name: Install Chromium for end-to-end scenarios
        if: ${{ startsWith(matrix.scenario, 'browser.') }}
        run: bunx playwright install --with-deps chromium

      - name: Run versioned end-to-end performance scenario
        env:
          PERF_SCENARIO: ${{ matrix.scenario }}
        run: bun perf run "$PERF_SCENARIO" --profile ci --output "artifacts/performance-lab/$PERF_SCENARIO.json"

      - name: Enforce approved trend baseline
        if: ${{ always() && inputs.baseline-history-path != '' }}
        env:
          BASELINE_HISTORY_PATH: ${{ inputs.baseline-history-path }}
          PERF_SCENARIO: ${{ matrix.scenario }}
        run: bun perf ci-gate --history "$BASELINE_HISTORY_PATH" --candidate "artifacts/performance-lab/$PERF_SCENARIO.json" --output "artifacts/performance-lab/$PERF_SCENARIO.gate.json"

      - name: Build performance artifact upload manifest
        if: ${{ always() }}
        shell: bash
        env:
          PERF_SCENARIO: ${{ matrix.scenario }}
        run: |
          set -euo pipefail
          candidate="artifacts/performance-lab/$PERF_SCENARIO.json"
          gate="artifacts/performance-lab/$PERF_SCENARIO.gate.json"
          files=(--file "$candidate")
          if [[ -f "$gate" ]]; then
            files+=(--file "$gate")
          fi
          bun perf artifact-manifest --receipt "$candidate" "${files[@]}" --output "artifacts/performance-lab/$PERF_SCENARIO.manifest.json"

      - name: Summarize performance lab
        if: ${{ always() }}
        shell: bash
        env:
          BASELINE_HISTORY_PATH: ${{ inputs.baseline-history-path }}
          PERF_SCENARIO: ${{ matrix.scenario }}
        run: |
          set -euo pipefail
          baseline_label="${BASELINE_HISTORY_PATH:-trend-only (no gate)}"
          {
            echo "### Performance lab"
            echo "- Scenario: \`$PERF_SCENARIO\`"
            echo "- Baseline history: \`$baseline_label\`"
            if [[ -f "artifacts/performance-lab/$PERF_SCENARIO.gate.json" ]]; then
              echo "- Gate: \`$(jq -r .status "artifacts/performance-lab/$PERF_SCENARIO.gate.json")\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance lab artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-lab-${{ matrix.scenario }}
          path: artifacts/performance-lab/**
          retention-days: 30
          if-no-files-found: error

  performance-smoke:
    name: performance smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun-deps

      - name: Run performance smoke
        run: bun scripts/checks/ci/check-performance-smoke.ts

      - name: Summarize performance smoke
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          report="artifacts/performance-smoke/performance-smoke-report.json"
          if [[ ! -f "$report" ]]; then
            echo "No performance smoke report was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Performance smoke"
            echo
            echo '```json'
            cat "$report"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload performance smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-smoke-report
          path: artifacts/performance-smoke/performance-smoke-report.json
          retention-days: 14
          if-no-files-found: warn
