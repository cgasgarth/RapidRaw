name: CI Build

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            target: aarch64-apple-darwin
            asset-prefix: '02'
          - platform: 'macos-15-intel'
            target: x86_64-apple-darwin
            asset-prefix: '02'
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      asset-prefix: ${{ matrix.asset-prefix }}
    secrets: inherit
    permissions:
      contents: write
