name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Build frontend and enforce bundle budget
        run: bun run check:bundle

      - name: Generate bundle analysis report
        if: ${{ always() }}
        run: bun scripts/ci/generate-vite-bundle-report.ts

      - name: Summarize bundle analysis
        if: ${{ always() }}
        run: bun scripts/ci/write-vite-bundle-step-summary.ts

      - name: Upload bundle analysis report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vite-bundle-report
          path: artifacts/bundle-report/**
          retention-days: 14
          if-no-files-found: error

      - name: Check translation extraction
        run: bun scripts/ci/run-compact-command.ts --label i18n -- bunx i18next-cli extract --ci --dry-run

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Typecheck
        run: bun run typecheck

  frontend-lint:
    name: 'frontend: biome lint'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint with Biome
        run: bun run lint

  frontend-format:
    name: 'frontend: biome format'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check formatting with Biome
        run: bun run format:check

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint translations
        run: bun scripts/ci/run-compact-command.ts --label i18n:lint -- bunx i18next-cli lint

  frontend-unused-deps:
    name: 'frontend: unused dependency gate'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check unused dependencies
        run: bun scripts/ci/run-compact-command.ts --label unused-deps -- bunx knip --config knip.jsonc --dependencies --reporter compact

  frontend-unsafe-casts:
    name: 'frontend: unsafe cast ban'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check script extension policy
        run: bun tests/integration/checks/check-script-extension-policy.ts

      - name: Check unsafe casts
        run: bun tests/integration/checks/check-unsafe-casts.ts

  frontend-visual-smoke:
    name: 'frontend: PR visual smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Capture PR visual smoke
        run: bun scripts/proofs/capture-visual-smoke.ts --scenario empty-library

      - name: Check browser Tauri harness
        run: bun tests/integration/checks/check-browser-tauri-harness.ts

      - name: Upload visual smoke screenshots
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-visual-smoke-screenshots
          path: artifacts/visual-smoke/*.png
          retention-days: 7
          if-no-files-found: ignore

  schema-check:
    name: 'schemas: RawEngine package'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check RawEngine schema package
        run: bun run check:schema

  schema-command-bus:
    name: 'schemas: edit command bus'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check edit command bus
        run: bun packages/rawengine-schema/scripts/check-edit-command-bus.ts

  schema-contract-gate:
    name: 'schemas: path-gated contract suite'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: schema-contract-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gh api \
              "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
              --paginate \
              --jq '.[] | @json' > .schema-contract-files.ndjson
            echo "args=--pull-files-ndjson .schema-contract-files.ndjson" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            gh api \
              "repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}" \
              --jq '.files[] | @json' > .schema-contract-files.ndjson
            echo "args=--pull-files-ndjson .schema-contract-files.ndjson" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "args=" >> "$GITHUB_OUTPUT"

      - name: Run schema contract checks when relevant
        run: bun scripts/checks/ci/check-schema-contract-gate.ts ${{ steps.schema-contract-files.outputs.args }}

  macos-smoke-decision:
    name: 'ci: macOS smoke decision'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: macos-smoke-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[] | @json' > .macos-smoke-files.ndjson
          echo "args=--pull-files-ndjson .macos-smoke-files.ndjson" >> "$GITHUB_OUTPUT"

      - name: Classify macOS smoke requirement
        id: macos-smoke-decision
        shell: bash
        run: |
          set -euo pipefail

          bun scripts/checks/ci/check-ci-classify-macos-smoke.ts ${{ steps.macos-smoke-files.outputs.args }} > .macos-smoke.outputs
          cat .macos-smoke.outputs >> "$GITHUB_OUTPUT"
          cat .macos-smoke.outputs

          decision="$(grep '^macos_smoke_decision=' .macos-smoke.outputs | cut -d= -f2-)"
          if [[ "$decision" == "unclassified-fail-closed" ]]; then
            echo "Unclassified path requires explicit CI routing before merge."
            exit 1
          fi

  docs-check:
    name: 'docs: markdown and links'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check Markdown formatting and internal links
        run: bun run check:docs

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  rust-pr-clippy:
    name: 'rust: clippy PR path gate'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Classify Rust requirement
        id: rust-pr-decision
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          paths="$(
            gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[].filename'
          )"

          if [[ -z "$paths" ]]; then
            echo "rust_ci_required=true" >> "$GITHUB_OUTPUT"
            echo "rust_ci_reason=no changed files reported; fail closed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eq '^(src-tauri/|[.]cargo/|[.]github/workflows/lint[.]yml$|Cargo[.]toml$|Cargo[.]lock$|rust-toolchain[.]toml$|rustfmt[.]toml$)' <<< "$paths"; then
            echo "rust_ci_required=true" >> "$GITHUB_OUTPUT"
            echo "rust_ci_reason=Rust/Tauri paths changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "rust_ci_required=false" >> "$GITHUB_OUTPUT"
          echo "rust_ci_reason=No Rust/Tauri paths changed" >> "$GITHUB_OUTPUT"

      - name: Install Tauri Linux dependencies
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        uses: ./.github/actions/install-tauri-linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        with:
          cache: false
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-pr-clippy
          cache-on-failure: true

      - name: Clippy when Rust/Tauri changed
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --no-default-features --features required-ci -- -D warnings -W clippy::redundant_clone

      - name: Enforce pure native contract dependency boundary
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        working-directory: src-tauri
        run: |
          test "$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "rapidraw-types") | [.dependencies[] | select(.kind == null) | .name] | sort | join(",")')" = "serde"
          test "$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "RapidRAW") | any(.dependencies[]; .name == "rapidraw-types")')" = "true"

      - name: Validate computational and codec leaf feature matrices
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        run: |
          bun tests/integration/checks/check-native-feature-leaves.ts
          cargo test --manifest-path src-tauri/Cargo.toml --locked -p rapidraw-computational
          cargo test --manifest-path src-tauri/Cargo.toml --locked -p rapidraw-codecs --no-default-features --features jpeg
          cargo test --manifest-path src-tauri/Cargo.toml --locked -p rapidraw-codecs --all-features

      - name: Build fast-dev and full native capability profiles
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        run: bun run check:native-profiles

      - name: Rust and Tauri IPC tests when Rust/Tauri changed
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        working-directory: src-tauri
        run: cargo test --quiet --locked --lib --no-default-features --features required-ci,tauri-test --no-fail-fast

      - name: Skip summary
        if: steps.rust-pr-decision.outputs.rust_ci_required != 'true'
        run: |
          echo "Rust clippy skipped: ${{ steps.rust-pr-decision.outputs.rust_ci_reason }}"

  actions-lint:
    name: 'github actions: actionlint'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.3'
          cache: false

      - name: Cache actionlint Go modules
        id: actionlint-go-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-${{ hashFiles('package.json') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-

      - name: Record actionlint Go cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.actionlint-go-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### actionlint Go cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Scope: \`${{ runner.os }}-${{ runner.arch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint GitHub Actions workflows
        run: bun run check:actions

  actions-pins:
    name: 'github actions: pinned versions'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Validate pinned GitHub Action versions
        run: bun tests/integration/checks/check-github-action-pins.ts

  dependency-security-js:
    name: 'security: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Audit JavaScript dependencies
        run: bun scripts/ci/run-compact-command.ts --label security:js -- bun audit --audit-level moderate

  dependency-security-rust:
    name: 'security: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-audit
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2

      - name: Record cargo-audit cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-audit-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-audit cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        run: bun tests/integration/checks/check-rust-advisory-waivers.ts && bun scripts/ci/run-compact-command.ts --label security:rust --cwd src-tauri -- cargo audit --ignore RUSTSEC-2024-0429 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

  dependency-license-rust:
    name: 'license: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-deny binary
        id: cargo-deny-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-deny
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8

      - name: Record cargo-deny cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-deny-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-deny cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-deny
        if: steps.cargo-deny-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.8

      - name: Check Rust dependency licenses
        working-directory: src-tauri
        run: cargo deny check licenses

  pr-ci-required:
    name: PR CI / required
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - frontend-typecheck
      - frontend-lint
      - frontend-format
      - frontend-i18n-lint
      - frontend-unused-deps
      - frontend-unsafe-casts
      - frontend-visual-smoke
      - schema-check
      - schema-command-bus
      - schema-contract-gate
      - macos-smoke-decision
      - docs-check
      - rust-fmt
      - rust-pr-clippy
      - actions-lint
      - actions-pins
      - dependency-security-js
      - dependency-security-rust
      - dependency-license-rust
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Verify required PR jobs
        shell: bash
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          failures="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | "\(.key)=\(.value.result)"
            ' <<< "$NEEDS_CONTEXT"
          )"

          if [[ -n "$failures" ]]; then
            echo "Blocking PR because required jobs did not all succeed:"
            echo "$failures"
            exit 1
          fi

          echo "Required short PR jobs passed."
          echo "Long macOS Rust/app checks run on main push and workflow_dispatch only."
          echo "All required PR jobs succeeded."
