name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  changed-paths:
    name: changed paths / macOS smoke routing
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      macos_smoke_required: ${{ steps.classify.outputs.macos_smoke_required }}
      macos_smoke_reason: ${{ steps.classify.outputs.macos_smoke_reason }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Fetch changed files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename' > "$RUNNER_TEMP/changed-files.txt"

          echo "Changed files:"
          sed 's/^/ - /' "$RUNNER_TEMP/changed-files.txt"

      - id: classify
        name: Classify macOS smoke requirement
        run: bun scripts/ci-classify-macos-smoke.mjs --files "$RUNNER_TEMP/changed-files.txt" >> "$GITHUB_OUTPUT"

      - name: Record routing decision
        run: |
          {
            echo "### macOS smoke routing"
            echo "Required: \`${{ steps.classify.outputs.macos_smoke_required }}\`"
            echo "Reason: ${{ steps.classify.outputs.macos_smoke_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Build frontend and enforce bundle budget
        run: bun run check:bundle

      - name: Check translation extraction
        run: bun run i18n:check

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - id: typecheck
        name: Typecheck
        continue-on-error: true
        run: bun run typecheck

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.typecheck.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` is tracked by #283 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` passed. Remove this temporary non-blocking wrapper when #283 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-lint:
    name: 'frontend: eslint zero warnings'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint with warnings denied
        run: bun run check:lint

  frontend-format:
    name: 'frontend: prettier baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - id: prettier
        name: Check formatting
        continue-on-error: true
        run: bun run format:check

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.prettier.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` is tracked by #289 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` passed. Remove this temporary non-blocking wrapper when #289 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - id: i18n-lint
        name: Lint translations
        continue-on-error: true
        run: bun run i18n:lint

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.i18n-lint.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` is tracked by #285 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` passed. Remove this temporary non-blocking wrapper when #285 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-unsafe-casts:
    name: 'frontend: unsafe cast ban'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check unsafe casts
        run: bun run check:unsafe-casts

  generated-type-drift:
    name: 'types: generated artifact drift'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check generated type drift
        run: bun run check:generated-types

  frontend-lint-escapes:
    name: 'frontend: lint escape hatch policy'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check documented lint escape hatches
        run: bun run check:lint-escapes

  docs-check:
    name: 'docs: markdown and links'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check Markdown formatting and internal links
        run: bun run docs:check

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -p RapidRAW -- --check

  actions-lint:
    name: 'github actions: actionlint'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.3'
          cache: false

      - name: Cache actionlint Go modules
        id: actionlint-go-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-${{ hashFiles('package.json') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-

      - name: Record actionlint Go cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.actionlint-go-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### actionlint Go cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Scope: \`${{ runner.os }}-${{ runner.arch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint GitHub Actions workflows
        run: bun run check:actions

  actions-pins:
    name: 'github actions: pinned versions'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Validate pinned GitHub Action versions
        run: bun run check:action-pins

  dependency-security-js:
    name: 'security: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Audit JavaScript dependencies
        run: bun run check:security:js

  dependency-security-rust:
    name: 'security: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2024-0429

  dependency-license-js:
    name: 'license: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check JavaScript dependency licenses
        run: bun run check:licenses:js

  dependency-license-rust:
    name: 'license: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.8

      - name: Check Rust dependency licenses
        working-directory: src-tauri
        run: cargo deny check licenses

  rust-check:
    name: 'rust: cargo check macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-check-macos-host-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: rust-check-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-

      - name: Record Rust check cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.rust-check-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### Rust check cache status"
            echo "- Rust cache key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-rust-check-macos-host-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked

  rust-clippy:
    name: 'rust: clippy baseline macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-clippy-macos-host-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: rust-clippy-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-

      - name: Record Rust clippy cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.rust-clippy-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### Rust clippy cache status"
            echo "- Rust cache key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-rust-clippy-macos-host-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  pr-macos-app-build:
    name: macOS app no-bundle smoke
    needs:
      - changed-paths
    if: github.event_name == 'pull_request' && needs.changed-paths.outputs.macos_smoke_required == 'true'
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-pr-smoke-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: pr-smoke-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-

      - name: Record macOS smoke cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.pr-smoke-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### macOS smoke cache status"
            echo "- Rust cache key suffix: \`v1-pr-smoke-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Add macOS target
        run: rustup target add aarch64-apple-darwin

      - id: tauri-build
        name: Build no-bundle app smoke
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --ci --no-bundle --target aarch64-apple-darwin
          retryAttempts: 3

      - name: Collect smoke failure diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail

          diagnostics_dir="$RUNNER_TEMP/failure-diagnostics"
          mkdir -p "$diagnostics_dir"

          {
            echo "job=macOS app no-bundle smoke"
            echo "target=aarch64-apple-darwin"
            echo "sha=$GITHUB_SHA"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
          } > "$diagnostics_dir/build-context.txt"

          {
            echo "## Disk"
            df -h
            echo
            echo "## Workspace sizes"
            du -sh dist src-tauri/target 2>/dev/null || true
          } > "$diagnostics_dir/storage.txt"

          {
            echo "## Toolchain"
            rustc --version || true
            cargo --version || true
            bun --version || true
            node --version || true
            npx tauri --version || true
          } > "$diagnostics_dir/toolchain.txt"

      - name: Upload smoke failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr_macos_smoke_failure_diagnostics
          path: |
            ${{ runner.temp }}/failure-diagnostics/**
            dist/**
            src-tauri/target/**/build/*/output
            src-tauri/target/**/build/*/stderr
            src-tauri/target/**/build/*/stdout
            src-tauri/target/**/bundle/**/*.log
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

  pr-ci-required:
    name: PR CI / required
    runs-on: ubuntu-latest
    needs:
      - changed-paths
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 360
    steps:
      - name: Wait for required peer jobs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          CHANGED_PATHS_RESULT: ${{ needs.changed-paths.result }}
          MACOS_SMOKE_REQUIRED: ${{ needs.changed-paths.outputs.macos_smoke_required }}
          MACOS_SMOKE_REASON: ${{ needs.changed-paths.outputs.macos_smoke_reason }}
        run: |
          set -euo pipefail

          if [[ "$CHANGED_PATHS_RESULT" != "success" ]]; then
            echo "Blocking PR because changed-path routing did not succeed: $CHANGED_PATHS_RESULT"
            exit 1
          fi

          if [[ "$MACOS_SMOKE_REQUIRED" != "true" && "$MACOS_SMOKE_REQUIRED" != "false" ]]; then
            echo "Blocking PR because changed-path routing produced an invalid macOS smoke decision: $MACOS_SMOKE_REQUIRED"
            exit 1
          fi

          required_jobs=(
            "changed paths / macOS smoke routing"
            "frontend: install, build, i18n check"
            "frontend: typecheck baseline"
            "frontend: eslint zero warnings"
            "frontend: prettier baseline"
            "frontend: i18n lint baseline"
            "frontend: unsafe cast ban"
            "types: generated artifact drift"
            "frontend: lint escape hatch policy"
            "docs: markdown and links"
            "rust: fmt"
            "github actions: actionlint"
            "github actions: pinned versions"
            "security: JavaScript dependencies"
            "security: Rust dependencies"
            "license: JavaScript dependencies"
            "license: Rust dependencies"
            "rust: cargo check macOS"
            "rust: clippy baseline macOS"
          )

          if [[ "$MACOS_SMOKE_REQUIRED" == "true" ]]; then
            required_jobs+=("macOS app no-bundle smoke")
          else
            echo "Skipping macOS app no-bundle smoke in aggregate wait."
            echo "Routing reason: $MACOS_SMOKE_REASON"
          fi

          required_jobs_json="$(printf '%s\n' "${required_jobs[@]}" | jq -R . | jq -s .)"

          echo "All validation jobs are dispatched independently; this job is only the branch-protection aggregate."
          echo "Queued macOS jobs usually mean waiting for GitHub-hosted macOS runner capacity, not a workflow dependency."
          echo "Waiting for required peer jobs:"
          printf ' - %s\n' "${required_jobs[@]}"

          while true; do
            jobs_json="$(gh run view "$RUN_ID" --repo "$REPO" --json jobs --jq '.jobs')"

            completed_failures="$(
              jq -r --argjson required "$required_jobs_json" '
                $required[] as $name
                | first(.[] | select(.name == $name)) as $job
                | select($job != null and $job.status == "completed" and $job.conclusion != "success")
                | "\($name)=\($job.conclusion)"
              ' <<< "$jobs_json"
            )"

            if [[ -n "$completed_failures" ]]; then
              echo "Blocking PR because a required peer job has already failed:"
              echo "$completed_failures"
              exit 1
            fi

            pending="$(
              jq -r --argjson required "$required_jobs_json" '
                $required[] as $name
                | first(.[] | select(.name == $name)) as $job
                | select($job == null or ($job.status != "completed"))
                | if $job == null then "\($name)=missing" else "\($name)=\($job.status)" end
              ' <<< "$jobs_json"
            )"

            if [[ -z "$pending" ]]; then
              break
            fi

            echo "Still waiting on:"
            echo "$pending"
            sleep 60
          done

          failures="$(
            jq -r --argjson required "$required_jobs_json" '
              $required[] as $name
              | first(.[] | select(.name == $name)) as $job
              | select($job == null or $job.conclusion != "success")
              | if $job == null then "\($name)=missing" else "\($name)=\($job.conclusion)" end
            ' <<< "$jobs_json"
          )"

          if [[ -n "$failures" ]]; then
            echo "Blocking PR because required jobs did not all succeed:"
            echo "$failures"
            exit 1
          fi

          echo "All required PR jobs succeeded."
