name: PR Fast Validation

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  plan:
    name: 'validation: affected fast-lane plan'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      js: ${{ steps.plan.outputs.js }}
      frontend: ${{ steps.plan.outputs.frontend }}
      schema: ${{ steps.plan.outputs.schema }}
      dependencies: ${{ steps.plan.outputs.dependencies }}
      rust: ${{ steps.plan.outputs.rust }}
      workflow: ${{ steps.plan.outputs.workflow }}
      docs: ${{ steps.plan.outputs.docs }}
      plan_json: ${{ steps.plan.outputs.plan_json }}
      started_epoch: ${{ steps.plan.outputs.started_epoch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Collect changed paths and authoritative workflow start
        id: workflow-start
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          run_started_at="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" --jq .run_started_at)"
          started_epoch="$(date -u -d "$run_started_at" +%s)"
          echo "started_epoch=$started_epoch" >> "$GITHUB_OUTPUT"
          if [[ -n "$BASE_SHA" ]]; then
            git diff --name-only --diff-filter=ACMR "$BASE_SHA...$HEAD_SHA" > .pr-paths
          else
            : > .pr-paths
          fi

      - name: Plan affected fast lanes and disclose deferred closure
        id: plan
        env:
          WORKFLOW_STARTED_EPOCH: ${{ steps.workflow-start.outputs.started_epoch }}
        run: bun scripts/ci/pr-ci-contract.ts --paths-file .pr-paths

  fast-lint:
    name: 'pr fast: lint'
    needs: plan
    if: needs.plan.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - run: bun run lint

  fast-typecheck:
    name: 'pr fast: typecheck'
    needs: plan
    if: needs.plan.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - run: bun run typecheck

  fast-schema:
    name: 'pr fast: schema contracts'
    needs: plan
    if: needs.plan.outputs.schema == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - run: bun run check:schema

  fast-unit:
    name: 'pr fast: unit tests'
    needs: plan
    if: needs.plan.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - run: bun run test:unit

  fast-format:
    name: 'pr fast: format'
    needs: plan
    if: needs.plan.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - run: bun run format:check

  fast-build-i18n:
    name: 'pr fast: frontend build and i18n'
    needs: plan
    if: needs.plan.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - name: Build frontend and validate translations
        run: |
          bun run check:bundle
          bunx i18next-cli lint
          bunx i18next-cli extract --ci --dry-run

  fast-unsafe-unused:
    name: 'pr fast: unsafe and unused dependency policy'
    needs: plan
    if: needs.plan.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - name: Check script, cast, and dependency policy
        run: |
          bun tests/integration/checks/check-script-extension-policy.ts
          bun tests/integration/checks/check-unsafe-casts.ts
          bunx knip --config knip.jsonc --dependencies --reporter compact

  fast-visual:
    name: 'pr fast: visual smoke'
    needs: plan
    if: needs.plan.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - name: Run browser visual smoke
        run: |
          bunx playwright install chromium
          bun scripts/proofs/capture-visual-smoke.ts --scenario empty-library
          bun tests/integration/checks/check-browser-tauri-harness.ts

  fast-js-security:
    name: 'pr fast: JavaScript audit'
    needs: plan
    if: needs.plan.outputs.dependencies == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - run: bun audit --audit-level moderate

  fast-rust:
    name: 'pr fast: affected native feedback'
    needs: plan
    if: needs.plan.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri
      - uses: ./.github/actions/setup-bun-deps
      - name: Run bounded native format and focused contract feedback
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo metadata --manifest-path src-tauri/Cargo.toml --locked --no-deps --format-version 1 > /dev/null
          bun test tests/pure-ts/native-feedback.test.ts
          bun tests/integration/checks/check-native-feature-leaves.ts
          bun tests/integration/checks/check-native-contract-boundary.ts

  fast-workflow:
    name: 'pr fast: workflow contracts'
    needs: plan
    if: needs.plan.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.3'
          cache: true
      - name: Validate workflows and pinned actions
        run: |
          bun run check:actions
          bun tests/integration/checks/check-github-action-pins.ts

  fast-docs:
    name: 'pr fast: documentation contracts'
    needs: plan
    if: needs.plan.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-bun-deps
      - name: Validate documentation
        run: bun run check:docs

  pr-ci-required:
    name: PR CI / required
    needs:
      - plan
      - fast-lint
      - fast-typecheck
      - fast-schema
      - fast-unit
      - fast-format
      - fast-build-i18n
      - fast-unsafe-unused
      - fast-visual
      - fast-js-security
      - fast-rust
      - fast-workflow
      - fast-docs
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Fail closed on lane failure, unexpected skip, or budget overrun
        shell: bash
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
          PLAN_JSON: ${{ needs.plan.outputs.plan_json }}
          STARTED_EPOCH: ${{ needs.plan.outputs.started_epoch }}
        run: |
          set -euo pipefail
          now_epoch="$(date +%s)"
          elapsed="$((now_epoch - STARTED_EPOCH))"
          failures="$(
            jq -r --argjson plan "$PLAN_JSON" '
              . as $needs
              |
              {
                js: ["fast-lint", "fast-typecheck", "fast-unit", "fast-format"],
                frontend: ["fast-build-i18n", "fast-unsafe-unused", "fast-visual"],
                schema: ["fast-schema"],
                dependencies: ["fast-js-security"],
                rust: ["fast-rust"],
                workflow: ["fast-workflow"],
                docs: ["fast-docs"]
              }
              | to_entries[] as $lane
              | $lane.value[] as $job
              | ($needs[$job].result // "missing") as $result
              | (if ($plan.lanes | has($lane.key)) then $plan.lanes[$lane.key] else true end) as $selected
              | select(($selected and $result != "success") or (($selected | not) and $result != "skipped"))
              | "\($job)=\($result)"
            ' <<< "$NEEDS_CONTEXT"
          )"
          if (( elapsed < 0 || elapsed > 240 )); then
            failures="${failures}${failures:+$'\n'}required validation elapsed=${elapsed}s budget=240s"
          fi
          deferred="$(jq -r '.deferredToMain | join("; ")' <<< "$PLAN_JSON")"
          {
            echo '## Required aggregate'
            echo
            echo "- Elapsed: ${elapsed}s / 240s"
            echo "- Deferred to non-canceling main: ${deferred}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$failures" ]]; then
            echo "$failures"
            exit 1
          fi
          echo "PR CI / required ok (${elapsed}s)"
