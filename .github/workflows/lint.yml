name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  validation-plan:
    name: 'validation: affected DAG plan'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun-deps

      - name: Plan affected validation from the shared manifest
        env:
          VALIDATION_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bun scripts/validation/run.ts --mode pr --base "$VALIDATION_BASE" --plan-only --explain-cache

  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Build frontend and enforce bundle budget
        run: bun run check:bundle

      - name: Generate bundle analysis report
        if: ${{ always() }}
        run: bun scripts/ci/generate-vite-bundle-report.ts

      - name: Summarize bundle analysis
        if: ${{ always() }}
        run: bun scripts/ci/write-vite-bundle-step-summary.ts

      - name: Upload bundle analysis report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vite-bundle-report
          path: artifacts/bundle-report/**
          retention-days: 14
          if-no-files-found: error

      - name: Check translation extraction
        run: bun scripts/ci/run-compact-command.ts --label i18n -- bunx i18next-cli extract --ci --dry-run

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Typecheck
        run: bun run typecheck

  frontend-lint:
    name: 'frontend: biome lint'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint with Biome
        run: bun run lint

  frontend-format:
    name: 'frontend: biome format'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check formatting with Biome
        run: bun run format:check

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint translations
        run: bun scripts/ci/run-compact-command.ts --label i18n:lint -- bunx i18next-cli lint

  frontend-unused-deps:
    name: 'frontend: unused dependency gate'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check unused dependencies
        run: bun scripts/ci/run-compact-command.ts --label unused-deps -- bunx knip --config knip.jsonc --dependencies --reporter compact

  frontend-unsafe-casts:
    name: 'frontend: unsafe cast ban'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check script extension policy
        run: bun tests/integration/checks/check-script-extension-policy.ts

      - name: Check unsafe casts
        run: bun tests/integration/checks/check-unsafe-casts.ts

  frontend-visual-smoke:
    name: 'frontend: PR visual smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Capture PR visual smoke
        run: bun scripts/proofs/capture-visual-smoke.ts --scenario empty-library

      - name: Check browser Tauri harness
        run: bun tests/integration/checks/check-browser-tauri-harness.ts

      - name: Upload visual smoke screenshots
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-visual-smoke-screenshots
          path: artifacts/visual-smoke/*.png
          retention-days: 7
          if-no-files-found: ignore

  schema-check:
    name: 'schemas: RawEngine package'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check RawEngine schema package
        run: bun run check:schema

  schema-command-bus:
    name: 'schemas: edit command bus'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check edit command bus
        run: bun packages/rawengine-schema/scripts/check-edit-command-bus.ts

  schema-contract-gate:
    name: 'schemas: path-gated contract suite'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: schema-contract-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gh api \
              "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
              --paginate \
              --jq '.[] | @json' > .schema-contract-files.ndjson
            echo "args=--pull-files-ndjson .schema-contract-files.ndjson" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            gh api \
              "repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}" \
              --jq '.files[] | @json' > .schema-contract-files.ndjson
            echo "args=--pull-files-ndjson .schema-contract-files.ndjson" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "args=" >> "$GITHUB_OUTPUT"

      - name: Run schema contract checks when relevant
        run: bun scripts/checks/ci/check-schema-contract-gate.ts ${{ steps.schema-contract-files.outputs.args }}

  macos-smoke-decision:
    name: 'ci: macOS smoke decision'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    outputs:
      startup_benchmark_required: ${{ steps.startup-benchmark-files.outputs.required }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: macos-smoke-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[] | @json' > .macos-smoke-files.ndjson
          echo "args=--pull-files-ndjson .macos-smoke-files.ndjson" >> "$GITHUB_OUTPUT"

      - name: Classify macOS smoke requirement
        id: macos-smoke-decision
        shell: bash
        run: |
          set -euo pipefail

          bun scripts/checks/ci/check-ci-classify-macos-smoke.ts ${{ steps.macos-smoke-files.outputs.args }} > .macos-smoke.outputs
          cat .macos-smoke.outputs >> "$GITHUB_OUTPUT"
          cat .macos-smoke.outputs

          decision="$(grep '^macos_smoke_decision=' .macos-smoke.outputs | cut -d= -f2-)"
          if [[ "$decision" == "unclassified-fail-closed" ]]; then
            echo "Unclassified path requires explicit CI routing before merge."
            exit 1
          fi

      - name: Classify native startup benchmark requirement
        id: startup-benchmark-files
        shell: bash
        run: |
          set -euo pipefail

          if jq -r '.filename' .macos-smoke-files.ndjson | grep -Eq '^([.]github/workflows/(lint|main-long-validation)[.]yml|index[.]html|scripts/benchmarks/startup-native[.]ts|src-tauri/src/(app/startup|lib)[.]rs|src/(main|mainApp)[.](ts|tsx)|src/hooks/app/useAppInitialization[.]ts|src/product/startupBootstrap[.]ts|src/utils/startup/startupTraceReporter[.]ts|src/validation/browserTauriHarness[.]mts|tests/(integration/checks/(check-browser-tauri-harness|check-startup-entry)|pure-ts/app/startup-(shell-handoff|trace-reporter)[.]test)[.](ts|tsx))$'; then
            echo 'required=true' >> "$GITHUB_OUTPUT"
          else
            echo 'required=false' >> "$GITHUB_OUTPUT"
          fi

  macos-native-startup-build:
    name: 'macOS: native startup benchmark build'
    needs: macos-smoke-decision
    if: needs.macos-smoke-decision.outputs.startup_benchmark_required == 'true'
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          target: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-startup-benchmark-aarch64-apple-darwin
          cache-on-failure: true

      - uses: ./.github/actions/setup-bun-deps

      - name: Build validation-harness app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          args: --ci --bundles app --target aarch64-apple-darwin --features required-ci,validation-harness
          retryAttempts: 2

      - name: Verify optimized validation app layout
        run: |
          find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 3 -print
          test -d src-tauri/target/aarch64-apple-darwin/release/bundle/macos/RapidRAW.app
          test -f src-tauri/target/aarch64-apple-darwin/release/bundle/macos/RapidRAW.app.tar.gz

      - name: Upload optimized validation app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-startup-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/RapidRAW.app.tar.gz
          if-no-files-found: error
          retention-days: 1

  macos-native-startup-benchmark:
    name: 'macOS: native startup benchmark'
    needs:
      - macos-smoke-decision
      - macos-native-startup-build
    if: always() && needs.macos-smoke-decision.outputs.startup_benchmark_required == 'true' && needs.macos-native-startup-build.result == 'success'
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Download optimized validation binary on a clean runtime runner
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: native-startup-${{ github.run_id }}-${{ github.run_attempt }}
          path: native-startup

      - name: Prepare native app
        run: |
          tar -xzf native-startup/RapidRAW.app.tar.gz -C native-startup
          test -x native-startup/RapidRAW.app/Contents/MacOS/RapidRAW
          xattr -cr native-startup/RapidRAW.app
          codesign --force --deep --sign - --timestamp=none native-startup/RapidRAW.app
          codesign --verify --deep --strict native-startup/RapidRAW.app

      - name: Run bounded cold, warm, and degraded startup samples
        env:
          RAWENGINE_STARTUP_HARDWARE_CLASS: github-hosted-macos-arm64
        run: bun scripts/benchmarks/startup-native.ts --binary native-startup/RapidRAW.app/Contents/MacOS/RapidRAW --pairs 30

  docs-check:
    name: 'docs: markdown and links'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Check Markdown formatting and internal links
        run: bun run check:docs

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  color-lab-fast:
    name: 'color: affected reference lab'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Compute affected color graph identity
        id: color-graph
        shell: bash
        run: |
          set -euo pipefail
          graph_fingerprint="$(git ls-files -s src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/src/color src-tauri/src/raw src-tauri/src/render src-tauri/src/export src-tauri/crates/rapidraw-color-reference | shasum -a 256 | cut -d ' ' -f 1)"
          echo "graph_fingerprint=$graph_fingerprint" >> "$GITHUB_OUTPUT"

      - name: Restore content-addressed color lab cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/color-lab-cache
          key: color-lab-v1-${{ runner.os }}-${{ runner.arch }}-${{ steps.color-graph.outputs.graph_fingerprint }}

      - name: Execute affected color lab
        shell: bash
        env:
          GRAPH_FINGERPRINT: ${{ steps.color-graph.outputs.graph_fingerprint }}
        run: |
          set -euo pipefail
          cargo run --locked --manifest-path src-tauri/Cargo.toml -p rapidraw-color-reference --bin rapidraw-color-lab -- \
            run --affected --graph "$GRAPH_FINGERPRINT" --output artifacts/color-lab-fast --cache "$RUNNER_TEMP/color-lab-cache"
          jq -e \
            --arg graph "$GRAPH_FINGERPRINT" \
            '.contract_id == "rapidraw.color-lab.v1" and .tier == "fast" and .passed == true and (.cache == "miss" or .cache == "hit") and .cache_identity.graph_fingerprint == $graph and .cache_identity.hardware.backend == "reference-cpu"' \
            artifacts/color-lab-fast/color-lab-report.json

      - name: Upload affected color lab reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: color-lab-fast-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/color-lab-fast/**
          retention-days: 14
          if-no-files-found: error

  native-feedback-classify:
    name: 'native: feedback partition decision'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    outputs:
      core_required: ${{ steps.partition.outputs.core_required }}
      full_required: ${{ steps.partition.outputs.full_required }}
      leaf_crates: ${{ steps.partition.outputs.leaf_crates }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed paths
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[].filename' > .native-feedback-paths

      - name: Select native feedback partitions
        id: partition
        run: bun scripts/native-feedback/workflow-selection.ts --paths-file .native-feedback-paths

      - name: Enforce selection, cache identity, and threshold regression contracts
        run: bun test tests/pure-ts/native-feedback.test.ts

  native-leaf-feedback:
    name: 'native: focused leaf feedback'
    runs-on: ubuntu-latest
    needs: native-feedback-classify
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        if: needs.native-feedback-classify.outputs.leaf_crates != '[]'
        with:
          cache: false
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Restore dependency-aware leaf cache
        if: needs.native-feedback-classify.outputs.leaf_crates != '[]'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v2-${{ runner.os }}-${{ runner.arch }}-rapid-dev-fast-leaves-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml', 'src-tauri/crates/**/*.rs') }}
          cache-on-failure: false

      - name: Test affected workspace leaves
        if: needs.native-feedback-classify.outputs.leaf_crates != '[]'
        working-directory: src-tauri
        env:
          LEAF_CRATES: ${{ needs.native-feedback-classify.outputs.leaf_crates }}
        run: |
          jq -r '.[]' <<< "$LEAF_CRATES" | while read -r crate; do
            cargo test --locked --profile rapid-dev-fast -p "$crate"
          done

      - name: Record leaf skip
        if: needs.native-feedback-classify.outputs.leaf_crates == '[]'
        run: echo 'No affected workspace leaf.'

  native-core-feedback:
    name: 'native: focused core feedback'
    runs-on: ubuntu-latest
    needs: native-feedback-classify
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/install-tauri-linux-deps
        if: needs.native-feedback-classify.outputs.core_required == 'true'

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        if: needs.native-feedback-classify.outputs.core_required == 'true'
        with:
          cache: false
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Restore dependency-aware core cache
        if: needs.native-feedback-classify.outputs.core_required == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v2-${{ runner.os }}-${{ runner.arch }}-rapid-dev-fast-core-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml', 'src-tauri/src/**/*.rs', 'src-tauri/crates/**/*.rs') }}
          cache-on-failure: false

      - name: Test root native library
        if: needs.native-feedback-classify.outputs.core_required == 'true'
        working-directory: src-tauri
        run: cargo test --locked --lib --profile rapid-dev-fast --no-default-features --features required-ci,tauri-test

      - name: Record core skip
        if: needs.native-feedback-classify.outputs.core_required != 'true'
        run: echo 'No root/core native input changed.'

  native-full-required:
    name: 'native: full required closure'
    runs-on: ubuntu-latest
    needs: native-feedback-classify
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/install-tauri-linux-deps
        if: needs.native-feedback-classify.outputs.full_required == 'true'

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        if: needs.native-feedback-classify.outputs.full_required == 'true'
        with:
          cache: false
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Run uncached full native validation
        if: needs.native-feedback-classify.outputs.full_required == 'true'
        working-directory: src-tauri
        run: cargo test --locked --all-targets --no-default-features --features required-ci,tauri-test --no-fail-fast

      - name: Record full skip
        if: needs.native-feedback-classify.outputs.full_required != 'true'
        run: echo 'No native input changed; full native closure not required.'

  rust-pr-clippy:
    name: 'rust: clippy PR path gate'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Classify Rust requirement
        id: rust-pr-decision
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          paths="$(
            gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[].filename'
          )"

          if [[ -z "$paths" ]]; then
            echo "rust_ci_required=true" >> "$GITHUB_OUTPUT"
            echo "rust_ci_reason=no changed files reported; fail closed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eq '^(src-tauri/|[.]cargo/|[.]github/workflows/lint[.]yml$|Cargo[.]toml$|Cargo[.]lock$|rust-toolchain[.]toml$|rustfmt[.]toml$)' <<< "$paths"; then
            echo "rust_ci_required=true" >> "$GITHUB_OUTPUT"
            echo "rust_ci_reason=Rust/Tauri paths changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "rust_ci_required=false" >> "$GITHUB_OUTPUT"
          echo "rust_ci_reason=No Rust/Tauri paths changed" >> "$GITHUB_OUTPUT"

      - name: Set up Bun and dependencies
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        uses: ./.github/actions/setup-bun-deps

      - name: Install Tauri Linux dependencies
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        uses: ./.github/actions/install-tauri-linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        with:
          cache: false
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-pr-clippy
          cache-on-failure: true

      - name: Clippy when Rust/Tauri changed
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --no-default-features --features required-ci -- -D warnings -W clippy::redundant_clone

      - name: Enforce pure native contract dependency boundary
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        working-directory: src-tauri
        run: |
          test "$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "rapidraw-types") | [.dependencies[] | select(.kind == null) | .name] | sort | join(",")')" = "serde"
          test "$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "RapidRAW") | any(.dependencies[]; .name == "rapidraw-types")')" = "true"

      - name: Validate computational and codec leaf feature matrices
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        run: |
          bun tests/integration/checks/check-native-feature-leaves.ts
          cargo test --manifest-path src-tauri/Cargo.toml --locked -p rapidraw-computational
          cargo test --manifest-path src-tauri/Cargo.toml --locked -p rapidraw-codecs --no-default-features --features jpeg
          cargo test --manifest-path src-tauri/Cargo.toml --locked -p rapidraw-codecs --all-features
      - name: Build fast-dev and full native capability profiles
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        run: bun run check:native-profiles
      - name: Rust and Tauri IPC tests when Rust/Tauri changed
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        working-directory: src-tauri
        run: cargo test --quiet --locked --lib --no-default-features --features required-ci,tauri-test --no-fail-fast

      - name: Skip summary
        if: steps.rust-pr-decision.outputs.rust_ci_required != 'true'
        run: |
          echo "Rust clippy skipped: ${{ steps.rust-pr-decision.outputs.rust_ci_reason }}"

  actions-lint:
    name: 'github actions: actionlint'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.3'
          cache: false

      - name: Cache actionlint Go modules
        id: actionlint-go-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-${{ hashFiles('package.json') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-

      - name: Record actionlint Go cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.actionlint-go-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### actionlint Go cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Scope: \`${{ runner.os }}-${{ runner.arch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint GitHub Actions workflows
        run: bun run check:actions

  actions-pins:
    name: 'github actions: pinned versions'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Validate pinned GitHub Action versions
        run: bun tests/integration/checks/check-github-action-pins.ts

  dependency-security-js:
    name: 'security: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Audit JavaScript dependencies
        run: bun scripts/ci/run-compact-command.ts --label security:js -- bun audit --audit-level moderate

  dependency-security-rust:
    name: 'security: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-audit
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2

      - name: Record cargo-audit cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-audit-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-audit cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        run: bun tests/integration/checks/check-rust-advisory-waivers.ts && bun scripts/ci/run-compact-command.ts --label security:rust --cwd src-tauri -- cargo audit --ignore RUSTSEC-2024-0429 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

  dependency-license-rust:
    name: 'license: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-deny binary
        id: cargo-deny-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-deny
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8

      - name: Record cargo-deny cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-deny-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-deny cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-deny
        if: steps.cargo-deny-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.8

      - name: Check Rust dependency licenses
        working-directory: src-tauri
        run: cargo deny check licenses

  pr-ci-required:
    name: PR CI / required
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - frontend-typecheck
      - frontend-lint
      - frontend-format
      - frontend-i18n-lint
      - frontend-unused-deps
      - frontend-unsafe-casts
      - frontend-visual-smoke
      - schema-check
      - schema-command-bus
      - schema-contract-gate
      - macos-smoke-decision
      - macos-native-startup-build
      - macos-native-startup-benchmark
      - docs-check
      - rust-fmt
      - color-lab-fast
      - native-feedback-classify
      - native-leaf-feedback
      - native-core-feedback
      - native-full-required
      - rust-pr-clippy
      - actions-lint
      - actions-pins
      - dependency-security-js
      - dependency-security-rust
      - dependency-license-rust
      - validation-plan
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Verify required PR jobs
        shell: bash
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          failures="$(
            jq -r '
              to_entries[]
              | select(
                  .value.result != "success"
                  and (
                    (.key != "macos-native-startup-build" and .key != "macos-native-startup-benchmark")
                    or .value.result != "skipped"
                  )
                )
              | "\(.key)=\(.value.result)"
            ' <<< "$NEEDS_CONTEXT"
          )"

          if [[ -n "$failures" ]]; then
            echo "Blocking PR because required jobs did not all succeed:"
            echo "$failures"
            exit 1
          fi

          echo "Required short PR jobs passed."
          echo "Long macOS Rust/app checks run on main push and workflow_dispatch only."
          echo "All required PR jobs succeeded."
