name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun-deps

      - name: Build frontend
        run: bun run build

      - name: Check translation extraction
        run: bun run i18n:check

  frontend-bun-install:
    name: 'frontend: bun install baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun-deps

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun-deps

      - id: typecheck
        name: Typecheck
        continue-on-error: true
        run: bun run typecheck

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.typecheck.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` is tracked by #283 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` passed. Remove this temporary non-blocking wrapper when #283 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-lint:
    name: 'frontend: eslint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun-deps

      - id: eslint
        name: Lint
        continue-on-error: true
        run: bun run lint

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.eslint.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run lint\` is tracked by #286 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run lint\` passed. Remove this temporary non-blocking wrapper when #286 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-format:
    name: 'frontend: prettier baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun-deps

      - id: prettier
        name: Check formatting
        continue-on-error: true
        run: bun run format:check

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.prettier.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` is tracked by #289 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` passed. Remove this temporary non-blocking wrapper when #289 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun-deps

      - id: i18n-lint
        name: Lint translations
        continue-on-error: true
        run: bun run i18n:lint

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.i18n-lint.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` is tracked by #285 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` passed. Remove this temporary non-blocking wrapper when #285 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -p RapidRAW -- --check

  rust-check:
    name: 'rust: cargo check macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-check-macos
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: ${{ runner.os }}-onnxruntime-macos-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-onnxruntime-macos-

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked

  rust-clippy:
    name: 'rust: clippy baseline macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-clippy-macos
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: ${{ runner.os }}-onnxruntime-macos-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-onnxruntime-macos-

      - id: clippy
        name: Clippy
        continue-on-error: true
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.clippy.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`cargo clippy --all-targets --all-features -- -D warnings\` is tracked by #287 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`cargo clippy --all-targets --all-features -- -D warnings\` passed. Remove this temporary non-blocking wrapper when #287 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  pr-macos-app-build:
    name: macOS app build baseline
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            target: aarch64-apple-darwin
            asset-prefix: '02'
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      asset-prefix: ${{ matrix.asset-prefix }}

  pr-ci-required:
    name: PR CI / required
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs:
      - frontend-build
      - frontend-bun-install
      - frontend-typecheck
      - frontend-lint
      - frontend-format
      - frontend-i18n-lint
      - rust-fmt
      - rust-check
      - rust-clippy
      - pr-macos-app-build
    steps:
      - name: Check required job results
        shell: bash
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail

          echo "$NEEDS_JSON"

          failures="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | "\(.key)=\(.value.result)"
            ' <<< "$NEEDS_JSON"
          )"

          if [[ -n "$failures" ]]; then
            echo "Blocking PR because required jobs did not all succeed:"
            echo "$failures"
            exit 1
          fi

          echo "All required PR jobs succeeded."
