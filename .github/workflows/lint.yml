name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Check translation extraction
        run: bun run i18n:check

  frontend-bun-install:
    name: 'frontend: bun install baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Check Bun version
        run: bun --version

      - name: Install dependencies with Bun
        run: bun install --frozen-lockfile

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: typecheck
        name: Typecheck
        continue-on-error: true
        run: bun run typecheck

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.typecheck.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` is tracked by #283 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` passed. Remove this temporary non-blocking wrapper when #283 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-lint:
    name: 'frontend: eslint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: eslint
        name: Lint
        continue-on-error: true
        run: bun run lint

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.eslint.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run lint\` is tracked by #286 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run lint\` passed. Remove this temporary non-blocking wrapper when #286 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-format:
    name: 'frontend: prettier baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: prettier
        name: Check formatting
        continue-on-error: true
        run: bun run format:check

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.prettier.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` is tracked by #289 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` passed. Remove this temporary non-blocking wrapper when #289 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: i18n-lint
        name: Lint translations
        continue-on-error: true
        run: bun run i18n:lint

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.i18n-lint.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` is tracked by #285 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` passed. Remove this temporary non-blocking wrapper when #285 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -p RapidRAW -- --check

  rust-check:
    name: 'rust: cargo check macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

  rust-clippy:
    name: 'rust: clippy baseline macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - id: clippy
        name: Clippy
        continue-on-error: true
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.clippy.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`cargo clippy --all-targets --all-features -- -D warnings\` is tracked by #287 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`cargo clippy --all-targets --all-features -- -D warnings\` passed. Remove this temporary non-blocking wrapper when #287 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi
