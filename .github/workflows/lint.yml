name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Build frontend
        run: bun run build

      - name: Check translation extraction
        run: bun run i18n:check

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - id: typecheck
        name: Typecheck
        continue-on-error: true
        run: bun run typecheck

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.typecheck.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` is tracked by #283 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run typecheck\` passed. Remove this temporary non-blocking wrapper when #283 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-lint:
    name: 'frontend: eslint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - id: eslint
        name: Lint
        continue-on-error: true
        run: bun run lint

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.eslint.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run lint\` is tracked by #286 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run lint\` passed. Remove this temporary non-blocking wrapper when #286 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-format:
    name: 'frontend: prettier baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - id: prettier
        name: Check formatting
        continue-on-error: true
        run: bun run format:check

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.prettier.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` is tracked by #289 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run format:check\` passed. Remove this temporary non-blocking wrapper when #289 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - id: i18n-lint
        name: Lint translations
        continue-on-error: true
        run: bun run i18n:lint

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.i18n-lint.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` is tracked by #285 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`bun run i18n:lint\` passed. Remove this temporary non-blocking wrapper when #285 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-unsafe-casts:
    name: 'frontend: unsafe cast ban'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check unsafe casts
        run: bun run check:unsafe-casts

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -p RapidRAW -- --check

  actions-lint:
    name: 'github actions: actionlint'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.3'
          cache: false

      - name: Lint GitHub Actions workflows
        run: bun run check:actions

  rust-check:
    name: 'rust: cargo check macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-check-macos
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: ${{ runner.os }}-onnxruntime-macos-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-onnxruntime-macos-

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked

  rust-clippy:
    name: 'rust: clippy baseline macOS'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-rust-clippy-macos
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: ${{ runner.os }}-onnxruntime-macos-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-onnxruntime-macos-

      - id: clippy
        name: Clippy
        continue-on-error: true
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Record baseline status
        if: always()
        run: |
          if [[ "${{ steps.clippy.outcome }}" == "failure" ]]; then
            echo "### Expected baseline failure" >> "$GITHUB_STEP_SUMMARY"
            echo "\`cargo clippy --all-targets --all-features -- -D warnings\` is tracked by #287 and is non-blocking until that issue is closed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Baseline command passed" >> "$GITHUB_STEP_SUMMARY"
            echo "\`cargo clippy --all-targets --all-features -- -D warnings\` passed. Remove this temporary non-blocking wrapper when #287 is closed." >> "$GITHUB_STEP_SUMMARY"
          fi

  pr-macos-app-build:
    name: macOS app no-bundle smoke
    if: github.event_name == 'pull_request'
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: pr-smoke-${{ runner.os }}-aarch64-apple-darwin
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: ${{ runner.os }}-onnxruntime-aarch64-apple-darwin-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-onnxruntime-aarch64-apple-darwin-

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Add macOS target
        run: rustup target add aarch64-apple-darwin

      - id: tauri-build
        name: Build no-bundle app smoke
        uses: tauri-apps/tauri-action@cf3eb9b18add8548a40584695215c80ab7274f31
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --ci --no-bundle --target aarch64-apple-darwin
          retryAttempts: 3

  pr-ci-required:
    name: PR CI / required
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 360
    steps:
      - name: Wait for required peer jobs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          required_jobs=(
            "frontend: install, build, i18n check"
            "frontend: typecheck baseline"
            "frontend: eslint baseline"
            "frontend: prettier baseline"
            "frontend: i18n lint baseline"
            "frontend: unsafe cast ban"
            "rust: fmt"
            "github actions: actionlint"
            "rust: cargo check macOS"
            "rust: clippy baseline macOS"
            "macOS app no-bundle smoke"
          )

          required_jobs_json="$(printf '%s\n' "${required_jobs[@]}" | jq -R . | jq -s .)"

          echo "All validation jobs are dispatched independently; this job is only the branch-protection aggregate."
          echo "Queued macOS jobs usually mean waiting for GitHub-hosted macOS runner capacity, not a workflow dependency."
          echo "Waiting for required peer jobs:"
          printf ' - %s\n' "${required_jobs[@]}"

          while true; do
            jobs_json="$(gh run view "$RUN_ID" --repo "$REPO" --json jobs --jq '.jobs')"

            completed_failures="$(
              jq -r --argjson required "$required_jobs_json" '
                $required[] as $name
                | first(.[] | select(.name == $name)) as $job
                | select($job != null and $job.status == "completed" and $job.conclusion != "success")
                | "\($name)=\($job.conclusion)"
              ' <<< "$jobs_json"
            )"

            if [[ -n "$completed_failures" ]]; then
              echo "Blocking PR because a required peer job has already failed:"
              echo "$completed_failures"
              exit 1
            fi

            pending="$(
              jq -r --argjson required "$required_jobs_json" '
                $required[] as $name
                | first(.[] | select(.name == $name)) as $job
                | select($job == null or ($job.status != "completed"))
                | if $job == null then "\($name)=missing" else "\($name)=\($job.status)" end
              ' <<< "$jobs_json"
            )"

            if [[ -z "$pending" ]]; then
              break
            fi

            echo "Still waiting on:"
            echo "$pending"
            sleep 60
          done

          failures="$(
            jq -r --argjson required "$required_jobs_json" '
              $required[] as $name
              | first(.[] | select(.name == $name)) as $job
              | select($job == null or $job.conclusion != "success")
              | if $job == null then "\($name)=missing" else "\($name)=\($job.conclusion)" end
            ' <<< "$jobs_json"
          )"

          if [[ -n "$failures" ]]; then
            echo "Blocking PR because required jobs did not all succeed:"
            echo "$failures"
            exit 1
          fi

          echo "All required PR jobs succeeded."
