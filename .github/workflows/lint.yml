name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Build frontend and enforce bundle budget
        run: bun run check:bundle

      - name: Generate bundle analysis report
        if: ${{ always() }}
        run: bun run bundle:report

      - name: Summarize bundle analysis
        if: ${{ always() }}
        run: bun run bundle:summary

      - name: Upload bundle analysis report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vite-bundle-report
          path: artifacts/bundle-report/**
          retention-days: 14
          if-no-files-found: error

      - name: Check translation extraction
        run: bun run i18n:check

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Typecheck
        run: bun run typecheck

  frontend-lint:
    name: 'frontend: eslint zero warnings'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint with warnings denied
        run: bun run check:lint

  frontend-format:
    name: 'frontend: prettier baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check formatting
        run: bun run format:check

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint translations
        run: bun run i18n:lint

  frontend-unused-deps:
    name: 'frontend: unused dependency gate'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check unused dependencies
        run: bun run check:unused-deps

  frontend-unsafe-casts:
    name: 'frontend: unsafe cast ban'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check script extension policy
        run: bun run check:script-extension-policy

      - name: Check unsafe casts
        run: bun run check:unsafe-casts

  frontend-visual-smoke:
    name: 'frontend: PR visual smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Capture PR visual smoke
        run: bun run check:visual-smoke:pr

      - name: Upload visual smoke screenshots
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-visual-smoke-screenshots
          path: artifacts/visual-smoke/*.png
          retention-days: 7
          if-no-files-found: ignore

  generated-type-drift:
    name: 'types: generated artifact drift'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check generated type drift
        run: bun run check:generated-types

  schema-check:
    name: 'schemas: RawEngine package'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check RawEngine schema package
        run: bun run schema:check

  schema-command-bus:
    name: 'schemas: edit command bus'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check edit command bus
        run: bun run schema:command-bus

  schema-contract-gate:
    name: 'schemas: path-gated contract suite'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: schema-contract-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gh api \
              "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
              --paginate \
              --jq '.[] | @json' > .schema-contract-files.ndjson
            echo "args=--pull-files-ndjson .schema-contract-files.ndjson" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            gh api \
              "repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}" \
              --jq '.files[] | @json' > .schema-contract-files.ndjson
            echo "args=--pull-files-ndjson .schema-contract-files.ndjson" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "args=" >> "$GITHUB_OUTPUT"

      - name: Run schema contract checks when relevant
        run: bun run schema:contract-gate -- ${{ steps.schema-contract-files.outputs.args }}

  macos-smoke-decision:
    name: 'ci: macOS smoke decision'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: macos-smoke-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[] | @json' > .macos-smoke-files.ndjson
          echo "args=--pull-files-ndjson .macos-smoke-files.ndjson" >> "$GITHUB_OUTPUT"

      - name: Classify macOS smoke requirement
        id: macos-smoke-decision
        shell: bash
        run: |
          set -euo pipefail

          bun scripts/ci-classify-macos-smoke.ts ${{ steps.macos-smoke-files.outputs.args }} > .macos-smoke.outputs
          cat .macos-smoke.outputs >> "$GITHUB_OUTPUT"
          cat .macos-smoke.outputs

          decision="$(grep '^macos_smoke_decision=' .macos-smoke.outputs | cut -d= -f2-)"
          if [[ "$decision" == "unclassified-fail-closed" ]]; then
            echo "Unclassified path requires explicit CI routing before merge."
            exit 1
          fi

  frontend-lint-escapes:
    name: 'frontend: lint escape hatch policy'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check documented lint escape hatches
        run: bun run check:lint-escapes

  docs-check:
    name: 'docs: markdown and links'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check Markdown formatting and internal links
        run: bun run docs:check

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -p RapidRAW -- --check

  rust-pr-check:
    name: 'rust: cargo check PR path gate'
    runs-on: macos-14
    if: github.event_name == 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: rust-pr-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[] | @json' > .rust-pr-files.ndjson
          echo "args=--pull-files-ndjson .rust-pr-files.ndjson" >> "$GITHUB_OUTPUT"

      - name: Classify Rust requirement
        id: rust-pr-decision
        run: bun scripts/ci-classify-rust-pr.ts ${{ steps.rust-pr-files.outputs.args }}

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-pr-check
          cache-on-failure: true

      - name: Cargo check when Rust/Tauri changed
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        run: bun run check:rust:check

      - name: Skip summary
        if: steps.rust-pr-decision.outputs.rust_ci_required != 'true'
        run: |
          echo "Rust check skipped: ${{ steps.rust-pr-decision.outputs.rust_ci_reason }}"

  rust-pr-clippy:
    name: 'rust: clippy PR path gate'
    runs-on: macos-14
    if: github.event_name == 'pull_request'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Collect changed files
        id: rust-pr-files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --paginate \
            --jq '.[] | @json' > .rust-pr-files.ndjson
          echo "args=--pull-files-ndjson .rust-pr-files.ndjson" >> "$GITHUB_OUTPUT"

      - name: Classify Rust requirement
        id: rust-pr-decision
        run: bun scripts/ci-classify-rust-pr.ts ${{ steps.rust-pr-files.outputs.args }}

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-pr-clippy
          cache-on-failure: true

      - name: Clippy when Rust/Tauri changed
        if: steps.rust-pr-decision.outputs.rust_ci_required == 'true'
        run: bun run check:rust:clippy

      - name: Skip summary
        if: steps.rust-pr-decision.outputs.rust_ci_required != 'true'
        run: |
          echo "Rust clippy skipped: ${{ steps.rust-pr-decision.outputs.rust_ci_reason }}"

  actions-lint:
    name: 'github actions: actionlint'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.3'
          cache: false

      - name: Cache actionlint Go modules
        id: actionlint-go-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-${{ hashFiles('package.json') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-

      - name: Record actionlint Go cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.actionlint-go-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### actionlint Go cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Scope: \`${{ runner.os }}-${{ runner.arch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint GitHub Actions workflows and policy
        run: bun run check:actions

  actions-pins:
    name: 'github actions: pinned versions'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Validate pinned GitHub Action versions
        run: bun run check:action-pins

  dependency-security-js:
    name: 'security: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Audit JavaScript dependencies
        run: bun run check:security:js

  dependency-security-rust:
    name: 'security: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2

      - name: Record cargo-audit cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-audit-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-audit cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2024-0429

  dependency-license-js:
    name: 'license: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check JavaScript dependency licenses
        run: bun run check:licenses:js

  dependency-license-rust:
    name: 'license: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-deny binary
        id: cargo-deny-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8

      - name: Record cargo-deny cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-deny-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-deny cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-deny
        if: steps.cargo-deny-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.8

      - name: Check Rust dependency licenses
        working-directory: src-tauri
        run: cargo deny check licenses

  pr-ci-required:
    name: PR CI / required
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - frontend-typecheck
      - frontend-lint
      - frontend-format
      - frontend-i18n-lint
      - frontend-unused-deps
      - frontend-unsafe-casts
      - frontend-visual-smoke
      - generated-type-drift
      - schema-check
      - schema-command-bus
      - schema-contract-gate
      - macos-smoke-decision
      - frontend-lint-escapes
      - docs-check
      - rust-fmt
      - rust-pr-check
      - rust-pr-clippy
      - actions-lint
      - actions-pins
      - dependency-security-js
      - dependency-security-rust
      - dependency-license-js
      - dependency-license-rust
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Verify required PR jobs
        shell: bash
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          failures="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | "\(.key)=\(.value.result)"
            ' <<< "$NEEDS_CONTEXT"
          )"

          if [[ -n "$failures" ]]; then
            echo "Blocking PR because required jobs did not all succeed:"
            echo "$failures"
            exit 1
          fi

          echo "Required short PR jobs passed."
          echo "Long macOS Rust/app checks run on main push and workflow_dispatch only."
          echo "All required PR jobs succeeded."
