name: Baseline Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  changed-paths:
    name: changed paths / macOS smoke routing
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      macos_smoke_required: ${{ steps.classify.outputs.macos_smoke_required }}
      macos_smoke_mode: ${{ steps.classify.outputs.macos_smoke_mode }}
      macos_smoke_args: ${{ steps.classify.outputs.macos_smoke_args }}
      macos_smoke_reason: ${{ steps.classify.outputs.macos_smoke_reason }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Fetch changed files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp "repos/$REPO/pulls/$PR_NUMBER/files" > "$RUNNER_TEMP/changed-files.json"
          gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename' > "$RUNNER_TEMP/changed-files.txt"

          echo "Changed files:"
          sed 's/^/ - /' "$RUNNER_TEMP/changed-files.txt"

      - id: classify
        name: Classify macOS smoke requirement
        run: bun scripts/ci-classify-macos-smoke.mjs --pull-files-json "$RUNNER_TEMP/changed-files.json" >> "$GITHUB_OUTPUT"

      - name: Record routing decision
        run: |
          {
            echo "### macOS smoke routing"
            echo "Required: \`${{ steps.classify.outputs.macos_smoke_required }}\`"
            echo "Mode: \`${{ steps.classify.outputs.macos_smoke_mode }}\`"
            echo "Args: \`${{ steps.classify.outputs.macos_smoke_args }}\`"
            echo "Reason: ${{ steps.classify.outputs.macos_smoke_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-build:
    name: 'frontend: install, build, i18n check'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Build frontend and enforce bundle budget
        run: bun run check:bundle

      - name: Check translation extraction
        run: bun run i18n:check

  frontend-typecheck:
    name: 'frontend: typecheck baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Typecheck
        run: bun run typecheck

  frontend-lint:
    name: 'frontend: eslint zero warnings'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint with warnings denied
        run: bun run check:lint

  frontend-format:
    name: 'frontend: prettier baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check formatting
        run: bun run format:check

  frontend-i18n-lint:
    name: 'frontend: i18n lint baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Lint translations
        run: bun run i18n:lint

  frontend-unsafe-casts:
    name: 'frontend: unsafe cast ban'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check unsafe casts
        run: bun run check:unsafe-casts

  generated-type-drift:
    name: 'types: generated artifact drift'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check generated type drift
        run: bun run check:generated-types

  schema-check:
    name: 'schemas: RawEngine package'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check RawEngine schema package
        run: bun run schema:check

  frontend-lint-escapes:
    name: 'frontend: lint escape hatch policy'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check documented lint escape hatches
        run: bun run check:lint-escapes

  docs-check:
    name: 'docs: markdown and links'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check Markdown formatting and internal links
        run: bun run docs:check

  rust-fmt:
    name: 'rust: fmt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt -p RapidRAW -- --check

  actions-lint:
    name: 'github actions: actionlint'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.3'
          cache: false

      - name: Cache actionlint Go modules
        id: actionlint-go-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-${{ hashFiles('package.json') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-actionlint-go-

      - name: Record actionlint Go cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.actionlint-go-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### actionlint Go cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Scope: \`${{ runner.os }}-${{ runner.arch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint GitHub Actions workflows and policy
        run: bun run check:actions

  actions-pins:
    name: 'github actions: pinned versions'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Validate pinned GitHub Action versions
        run: bun run check:action-pins

  dependency-security-js:
    name: 'security: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Audit JavaScript dependencies
        run: bun run check:security:js

  dependency-security-rust:
    name: 'security: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2

      - name: Record cargo-audit cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-audit-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-audit cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-audit-0.22.2\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked --version 0.22.2

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2024-0429

  dependency-license-js:
    name: 'license: JavaScript dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-bun-deps

      - name: Check JavaScript dependency licenses
        run: bun run check:licenses:js

  dependency-license-rust:
    name: 'license: Rust dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Cache cargo-deny binary
        id: cargo-deny-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8

      - name: Record cargo-deny cache status
        run: |
          set -euo pipefail

          cache_hit="${{ steps.cargo-deny-cache.outputs.cache-hit }}"
          if [[ -z "$cache_hit" ]]; then
            cache_hit="miss"
          fi

          {
            echo "### cargo-deny cache"
            echo "- Exact hit: \`$cache_hit\`"
            echo "- Key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-cargo-deny-0.19.8\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install cargo-deny
        if: steps.cargo-deny-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked --version 0.19.8

      - name: Check Rust dependency licenses
        working-directory: src-tauri
        run: cargo deny check licenses

  rust-check:
    name: 'rust: cargo check macOS'
    needs:
      - changed-paths
    if: >-
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.changed-paths.outputs.macos_smoke_mode != 'none')
      )
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-check-macos-host-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: rust-check-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-

      - name: Record Rust check cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.rust-check-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### Rust check cache status"
            echo "- Rust cache key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-rust-check-macos-host-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked

  rust-clippy:
    name: 'rust: clippy baseline macOS'
    needs:
      - changed-paths
    if: >-
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.changed-paths.outputs.macos_smoke_mode != 'none')
      )
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-clippy-macos-host-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: rust-clippy-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-

      - name: Record Rust clippy cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.rust-clippy-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### Rust clippy cache status"
            echo "- Rust cache key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-rust-clippy-macos-host-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  rust-test:
    name: 'rust: tests macOS'
    needs:
      - changed-paths
    if: always() && (github.event_name != 'pull_request' || needs.changed-paths.outputs.macos_smoke_mode != 'none')
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-test-macos-host-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: rust-test-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-macos-host-desktop-

      - name: Record Rust test cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.rust-test-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### Rust test cache status"
            echo "- Rust cache key suffix: \`v1-${{ runner.os }}-${{ runner.arch }}-rust-test-macos-host-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --locked --all-targets --all-features --no-fail-fast

  pr-macos-app-build:
    name: macOS app no-bundle smoke
    needs:
      - changed-paths
    if: github.event_name == 'pull_request' && needs.changed-paths.outputs.macos_smoke_mode != 'none'
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: false
          rustflags: ''
          rust-src-dir: src-tauri
          target: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-pr-smoke-${{ needs.changed-paths.outputs.macos_smoke_mode }}-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: pr-smoke-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-

      - name: Record macOS smoke cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.pr-smoke-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### macOS smoke cache status"
            echo "- Mode: \`${{ needs.changed-paths.outputs.macos_smoke_mode }}\`"
            echo "- Rust cache key suffix: \`v1-pr-smoke-${{ needs.changed-paths.outputs.macos_smoke_mode }}-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-bun-deps

      - id: tauri-build
        name: Build no-bundle app smoke
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ needs.changed-paths.outputs.macos_smoke_args }}
          retryAttempts: 3

      - name: Collect smoke failure diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail

          diagnostics_dir="$RUNNER_TEMP/failure-diagnostics"
          mkdir -p "$diagnostics_dir"

          {
            echo "job=macOS app no-bundle smoke"
            echo "target=aarch64-apple-darwin"
            echo "sha=$GITHUB_SHA"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
          } > "$diagnostics_dir/build-context.txt"

          {
            echo "## Disk"
            df -h
            echo
            echo "## Workspace sizes"
            du -sh dist src-tauri/target 2>/dev/null || true
          } > "$diagnostics_dir/storage.txt"

          {
            echo "## Toolchain"
            rustc --version || true
            cargo --version || true
            bun --version || true
            bun run tauri --version || true
          } > "$diagnostics_dir/toolchain.txt"

      - name: Upload smoke failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr_macos_smoke_failure_diagnostics
          path: |
            ${{ runner.temp }}/failure-diagnostics/**
            dist/**
            src-tauri/target/**/build/*/output
            src-tauri/target/**/build/*/stderr
            src-tauri/target/**/build/*/stdout
            src-tauri/target/**/bundle/**/*.log
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

  pr-ci-required:
    name: PR CI / required
    runs-on: ubuntu-latest
    needs:
      - changed-paths
      - frontend-build
      - frontend-typecheck
      - frontend-lint
      - frontend-format
      - frontend-i18n-lint
      - frontend-unsafe-casts
      - generated-type-drift
      - schema-check
      - frontend-lint-escapes
      - docs-check
      - rust-fmt
      - actions-lint
      - actions-pins
      - dependency-security-js
      - dependency-security-rust
      - dependency-license-js
      - dependency-license-rust
      - rust-check
      - rust-clippy
      - rust-test
      - pr-macos-app-build
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Verify required peer jobs
        shell: bash
        env:
          CHANGED_PATHS_RESULT: ${{ needs.changed-paths.result }}
          FRONTEND_BUILD_RESULT: ${{ needs.frontend-build.result }}
          FRONTEND_TYPECHECK_RESULT: ${{ needs.frontend-typecheck.result }}
          FRONTEND_LINT_RESULT: ${{ needs.frontend-lint.result }}
          FRONTEND_FORMAT_RESULT: ${{ needs.frontend-format.result }}
          FRONTEND_I18N_LINT_RESULT: ${{ needs.frontend-i18n-lint.result }}
          FRONTEND_UNSAFE_CASTS_RESULT: ${{ needs.frontend-unsafe-casts.result }}
          GENERATED_TYPE_DRIFT_RESULT: ${{ needs.generated-type-drift.result }}
          SCHEMA_CHECK_RESULT: ${{ needs.schema-check.result }}
          FRONTEND_LINT_ESCAPES_RESULT: ${{ needs.frontend-lint-escapes.result }}
          DOCS_CHECK_RESULT: ${{ needs.docs-check.result }}
          RUST_FMT_RESULT: ${{ needs.rust-fmt.result }}
          ACTIONS_LINT_RESULT: ${{ needs.actions-lint.result }}
          ACTIONS_PINS_RESULT: ${{ needs.actions-pins.result }}
          DEPENDENCY_SECURITY_JS_RESULT: ${{ needs.dependency-security-js.result }}
          DEPENDENCY_SECURITY_RUST_RESULT: ${{ needs.dependency-security-rust.result }}
          DEPENDENCY_LICENSE_JS_RESULT: ${{ needs.dependency-license-js.result }}
          DEPENDENCY_LICENSE_RUST_RESULT: ${{ needs.dependency-license-rust.result }}
          RUST_CHECK_RESULT: ${{ needs.rust-check.result }}
          RUST_CLIPPY_RESULT: ${{ needs.rust-clippy.result }}
          RUST_TEST_RESULT: ${{ needs.rust-test.result }}
          PR_MACOS_APP_BUILD_RESULT: ${{ needs.pr-macos-app-build.result }}
          MACOS_SMOKE_REQUIRED: ${{ needs.changed-paths.outputs.macos_smoke_required }}
          MACOS_SMOKE_MODE: ${{ needs.changed-paths.outputs.macos_smoke_mode }}
          MACOS_SMOKE_ARGS: ${{ needs.changed-paths.outputs.macos_smoke_args }}
          MACOS_SMOKE_REASON: ${{ needs.changed-paths.outputs.macos_smoke_reason }}
        run: |
          set -euo pipefail

          if [[ "$CHANGED_PATHS_RESULT" != "success" ]]; then
            echo "Blocking PR because changed-path routing did not succeed: $CHANGED_PATHS_RESULT"
            exit 1
          fi

          if [[ "$MACOS_SMOKE_REQUIRED" != "true" && "$MACOS_SMOKE_REQUIRED" != "false" ]]; then
            echo "Blocking PR because changed-path routing produced an invalid macOS smoke decision: $MACOS_SMOKE_REQUIRED"
            exit 1
          fi

          if [[ "$MACOS_SMOKE_MODE" != "none" && "$MACOS_SMOKE_MODE" != "debug" && "$MACOS_SMOKE_MODE" != "release" ]]; then
            echo "Blocking PR because changed-path routing produced an invalid macOS smoke mode: $MACOS_SMOKE_MODE"
            exit 1
          fi

          if [[ "$MACOS_SMOKE_MODE" == "none" && -n "$MACOS_SMOKE_ARGS" ]]; then
            echo "Blocking PR because skipped macOS smoke unexpectedly produced args: $MACOS_SMOKE_ARGS"
            exit 1
          fi

          if [[ "$MACOS_SMOKE_MODE" != "none" && -z "$MACOS_SMOKE_ARGS" ]]; then
            echo "Blocking PR because required macOS smoke did not produce Tauri args."
            exit 1
          fi

          failures=()

          require_success() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" ]]; then
              failures+=("$name=$result")
            fi
          }

          echo "All validation jobs are dispatched independently; this job only verifies branch-protection results."

          require_success "changed paths / macOS smoke routing" "$CHANGED_PATHS_RESULT"
          require_success "frontend: install, build, i18n check" "$FRONTEND_BUILD_RESULT"
          require_success "frontend: typecheck baseline" "$FRONTEND_TYPECHECK_RESULT"
          require_success "frontend: eslint zero warnings" "$FRONTEND_LINT_RESULT"
          require_success "frontend: prettier baseline" "$FRONTEND_FORMAT_RESULT"
          require_success "frontend: i18n lint baseline" "$FRONTEND_I18N_LINT_RESULT"
          require_success "frontend: unsafe cast ban" "$FRONTEND_UNSAFE_CASTS_RESULT"
          require_success "types: generated artifact drift" "$GENERATED_TYPE_DRIFT_RESULT"
          require_success "schemas: RawEngine package" "$SCHEMA_CHECK_RESULT"
          require_success "frontend: lint escape hatch policy" "$FRONTEND_LINT_ESCAPES_RESULT"
          require_success "docs: markdown and links" "$DOCS_CHECK_RESULT"
          require_success "rust: fmt" "$RUST_FMT_RESULT"
          require_success "github actions: actionlint" "$ACTIONS_LINT_RESULT"
          require_success "github actions: pinned versions" "$ACTIONS_PINS_RESULT"
          require_success "security: JavaScript dependencies" "$DEPENDENCY_SECURITY_JS_RESULT"
          require_success "security: Rust dependencies" "$DEPENDENCY_SECURITY_RUST_RESULT"
          require_success "license: JavaScript dependencies" "$DEPENDENCY_LICENSE_JS_RESULT"
          require_success "license: Rust dependencies" "$DEPENDENCY_LICENSE_RUST_RESULT"

          if [[ "$MACOS_SMOKE_MODE" != "none" ]]; then
            require_success "rust: cargo check macOS" "$RUST_CHECK_RESULT"
            require_success "rust: clippy baseline macOS" "$RUST_CLIPPY_RESULT"
            require_success "rust: tests macOS" "$RUST_TEST_RESULT"
            require_success "macOS app no-bundle smoke" "$PR_MACOS_APP_BUILD_RESULT"
          else
            echo "Skipping macOS Rust check, macOS clippy, macOS Rust tests, and macOS app no-bundle smoke in aggregate verification."
            echo "Routing reason: $MACOS_SMOKE_REASON"
          fi

          if (( ${#failures[@]} > 0 )); then
            echo "Blocking PR because required jobs did not all succeed:"
            printf ' - %s\n' "${failures[@]}"
            exit 1
          fi

          echo "All required PR jobs succeeded."
