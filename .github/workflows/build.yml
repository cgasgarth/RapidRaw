name: build

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      target:
        required: true
        type: string
      build-args:
        required: false
        type: string
      release-id:
        required: false
        type: string
      asset-prefix:
        required: false
        type: string
      asset-name-pattern:
        required: false
        type: string
      upload-artifacts:
        required: false
        type: boolean
        default: true
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
        default: ${{ github.ref }}
      mobile:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ inputs.platform }}-${{ inputs.target }}-${{ inputs.mobile }}
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            src-tauri/resources/libonnxruntime.dylib
            src-tauri/resources/libonnxruntime.so
            src-tauri/resources/onnxruntime.dll
            src-tauri/libs/arm64-v8a/libonnxruntime.so
          key: ${{ runner.os }}-onnxruntime-${{ inputs.target }}-${{ inputs.mobile }}-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-onnxruntime-${{ inputs.target }}-${{ inputs.mobile }}-

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-bun-deps
        with:
          node-version: ${{ inputs.mobile == 'android' && '26' || '' }}

      - name: Install additional system dependencies (Linux)
        if: runner.os == 'Linux' && inputs.mobile == ''
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ------------- Android Setup -------------
      - name: Set up JDK
        if: inputs.mobile == 'android'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        if: inputs.mobile == 'android'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup Android NDK
        if: inputs.mobile == 'android'
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Setup Android signing
        if: inputs.mobile == 'android' && github.event_name != 'pull_request'
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: rustup install target
        if: ${{ inputs.target != '' }}
        run: rustup target add ${{ inputs.target }}

      - id: patch-release-name
        shell: bash
        if: ${{ inputs.release-id != '' }}
        run: |
          platform="${{ inputs.platform }}"
          if [[ "${{ inputs.mobile }}" == "android" ]]; then
            replacement="android"
          else
            replacement="$(echo "$platform" | sed -E 's/-latest//')"
          fi
          patched_platform=$(echo '${{ inputs.asset-name-pattern }}' | sed -E "s/\[platform\]/${replacement}/")
          if [[ -n "${{ inputs.asset-prefix }}" ]]; then
            patched_platform="${{ inputs.asset-prefix }}_${patched_platform}"
          fi
          echo "platform=${patched_platform}" >> "$GITHUB_OUTPUT"

      - id: tauri-build
        name: Build with tauri-action
        if: ${{ inputs.mobile == '' }}
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: ${{ startsWith(inputs.platform, 'ubuntu') }}
        with:
          args: --verbose ${{ inputs.build-args }} ${{ inputs.target != '' && '--target' || ''  }} ${{ inputs.target }}
          assetNamePattern: ${{ steps.patch-release-name.outputs.platform }}
          releaseId: ${{ inputs.release-id }}
          retryAttempts: 3

      - name: Build Android
        if: ${{ inputs.mobile == 'android' }}
        shell: bash
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ORT_SKIP_DOWNLOAD: '1'
          ORT_LIB_LOCATION: ${{ format('{0}/src-tauri/libs/arm64-v8a', github.workspace) }}
          ORT_STRATEGY: manual
        run: |
          npx tauri android build --verbose ${{ inputs.build-args }}

      - name: Prepare Android Release Assets
        if: ${{ inputs.mobile == 'android' && inputs.release-id != '' }}
        shell: bash
        run: |
          set -euo pipefail

          stage_dir="$RUNNER_TEMP/android-release-assets"
          mkdir -p "$stage_dir"

          app_name="RapidRAW"
          version="$(node -e "const fs=require('fs'); const conf=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); process.stdout.write(conf.version || '')")"
          arch="${{ inputs.target }}"
          arch="${arch%%-*}"
          template='${{ steps.patch-release-name.outputs.platform }}'

          find src-tauri/gen/android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | while read -r file; do
            ext=".${file##*.}"
            asset_name="${template//\[name\]/$app_name}"
            asset_name="${asset_name//\[version\]/$version}"
            asset_name="${asset_name//\[arch\]/$arch}"
            asset_name="${asset_name//\[ext\]/$ext}"
            cp "$file" "$stage_dir/$asset_name"
          done

      - name: Upload Android Release Assets
        if: ${{ inputs.mobile == 'android' && inputs.release-id != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag_ref="${{ inputs.ref }}"
          tag_name="${tag_ref#refs/tags/}"
          gh release upload "$tag_name" "$RUNNER_TEMP"/android-release-assets/* --clobber

      - name: Upload Android Artifacts
        if: ${{ inputs.upload-artifacts && inputs.mobile == 'android' && inputs.release-id == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_android${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Upload Windows Artifacts
        if: ${{ inputs.upload-artifacts && startsWith(inputs.platform, 'windows') && inputs.release-id == '' && inputs.mobile == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/target/${{ inputs.target || 'release' }}/bundle/**/*.exe
            src-tauri/target/${{ inputs.target || 'release' }}/release/bundle/**/*.exe
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Upload Linux/macOS Artifacts
        if: ${{ inputs.upload-artifacts && !startsWith(inputs.platform, 'windows') && inputs.release-id == '' && inputs.mobile == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.rpm
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.deb
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.AppImage
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.dmg
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn
