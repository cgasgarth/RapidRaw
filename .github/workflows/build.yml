name: build

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      target:
        required: true
        type: string
      build-args:
        required: false
        type: string
      release-id:
        required: false
        type: string
      asset-prefix:
        required: false
        type: string
      asset-name-pattern:
        required: false
        type: string
      upload-artifacts:
        required: false
        type: boolean
        default: true
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
        default: ${{ github.ref }}
      mobile:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ inputs.platform }}-${{ runner.arch }}-${{ inputs.target || 'host' }}-${{ inputs.mobile || 'desktop' }}
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: onnx-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            src-tauri/resources/libonnxruntime.dylib
            src-tauri/resources/libonnxruntime.so
            src-tauri/resources/onnxruntime.dll
            src-tauri/libs/arm64-v8a/libonnxruntime.so
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-${{ inputs.target || 'host' }}-${{ inputs.mobile || 'desktop' }}-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-${{ inputs.target || 'host' }}-${{ inputs.mobile || 'desktop' }}-

      - name: Record build cache status
        shell: bash
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### Build cache status"
            echo "- Rust cache key suffix: \`v1-${{ inputs.platform }}-${{ runner.arch }}-${{ inputs.target || 'host' }}-${{ inputs.mobile || 'desktop' }}\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
            echo "- ONNX scope: \`${{ runner.os }}-${{ runner.arch }}-${{ inputs.target || 'host' }}-${{ inputs.mobile || 'desktop' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Install additional system dependencies (Linux)
        if: runner.os == 'Linux' && inputs.mobile == ''
        uses: ./.github/actions/install-tauri-linux-deps

      # ------------- Android Setup -------------
      - name: Set up JDK
        if: inputs.mobile == 'android'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        if: inputs.mobile == 'android'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup Android NDK
        if: inputs.mobile == 'android'
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Setup Android signing
        if: inputs.mobile == 'android' && github.event_name != 'pull_request'
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: rustup install target
        if: ${{ inputs.target != '' }}
        run: rustup target add ${{ inputs.target }}

      - id: patch-release-name
        shell: bash
        if: ${{ inputs.release-id != '' }}
        run: |
          platform="${{ inputs.platform }}"
          if [[ "${{ inputs.mobile }}" == "android" ]]; then
            replacement="android"
          else
            replacement="$(echo "$platform" | sed -E 's/-latest//')"
          fi
          patched_platform=$(echo '${{ inputs.asset-name-pattern }}' | sed -E "s/\[platform\]/${replacement}/")
          if [[ -n "${{ inputs.asset-prefix }}" ]]; then
            patched_platform="${{ inputs.asset-prefix }}_${patched_platform}"
          fi
          echo "platform=${patched_platform}" >> "$GITHUB_OUTPUT"

      - id: tauri-build
        name: Build with tauri-action
        if: ${{ inputs.mobile == '' }}
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: ${{ startsWith(inputs.platform, 'ubuntu') }}
        with:
          args: --verbose ${{ inputs.build-args }} ${{ inputs.target != '' && '--target' || ''  }} ${{ inputs.target }}
          assetNamePattern: ${{ steps.patch-release-name.outputs.platform }}
          releaseId: ${{ inputs.release-id }}
          retryAttempts: 3

      - name: Build Android
        if: ${{ inputs.mobile == 'android' }}
        shell: bash
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ORT_SKIP_DOWNLOAD: '1'
          ORT_LIB_LOCATION: ${{ format('{0}/src-tauri/libs/arm64-v8a', github.workspace) }}
          ORT_STRATEGY: manual
        run: |
          bun run tauri android build --verbose ${{ inputs.build-args }}

      - name: Prepare Android Release Assets
        if: ${{ inputs.mobile == 'android' && inputs.release-id != '' }}
        shell: bash
        run: |
          set -euo pipefail

          stage_dir="$RUNNER_TEMP/android-release-assets"
          mkdir -p "$stage_dir"

          app_name="RapidRAW"
          version="$(bun --print "import { readFileSync } from 'node:fs'; JSON.parse(readFileSync('src-tauri/tauri.conf.json', 'utf8')).version ?? ''")"
          arch="${{ inputs.target }}"
          arch="${arch%%-*}"
          template='${{ steps.patch-release-name.outputs.platform }}'

          find src-tauri/gen/android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | while read -r file; do
            ext=".${file##*.}"
            asset_name="${template//\[name\]/$app_name}"
            asset_name="${asset_name//\[version\]/$version}"
            asset_name="${asset_name//\[arch\]/$arch}"
            asset_name="${asset_name//\[ext\]/$ext}"
            cp "$file" "$stage_dir/$asset_name"
          done

      - id: release-metadata
        name: Generate release checksums
        if: ${{ inputs.release-id != '' || inputs.upload-artifacts }}
        shell: bash
        run: |
          set -euo pipefail

          metadata_dir="$RUNNER_TEMP/release-metadata"
          mkdir -p "$metadata_dir"

          metadata_prefix="${{ inputs.platform }}"
          if [[ -n "${{ inputs.asset-prefix }}" ]]; then
            metadata_prefix="${{ inputs.asset-prefix }}_${metadata_prefix}"
          fi
          if [[ -n "${{ inputs.target }}" ]]; then
            metadata_prefix="${metadata_prefix}_${{ inputs.target }}"
          fi
          if [[ -n "${{ inputs.mobile }}" ]]; then
            metadata_prefix="${metadata_prefix}_${{ inputs.mobile }}"
          fi

          bun scripts/release/generate-release-metadata.ts \
            --output-dir "$metadata_dir" \
            --prefix "$metadata_prefix" \
            --root src-tauri/target \
            --root src-tauri/gen/android/app/build/outputs \
            --root "$RUNNER_TEMP/android-release-assets"

          echo "metadata-dir=$metadata_dir" >> "$GITHUB_OUTPUT"

      - name: Generate repository SBOM
        if: ${{ (inputs.release-id != '' || inputs.upload-artifacts) && inputs.platform == 'macos-14' && inputs.target == 'aarch64-apple-darwin' && inputs.mobile == '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-metadata"
          gh api "repos/$GITHUB_REPOSITORY/dependency-graph/sbom" > "$RUNNER_TEMP/release-metadata/source_sbom.spdx.json"

      - name: Upload release metadata
        if: ${{ inputs.release-id != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag_ref="${{ inputs.ref }}"
          tag_name="${tag_ref#refs/tags/}"
          if compgen -G "$RUNNER_TEMP/release-metadata/*" > /dev/null; then
            gh release upload "$tag_name" "$RUNNER_TEMP"/release-metadata/* --clobber
          else
            echo "No release metadata files found to upload."
          fi

      - name: Upload Android Release Assets
        if: ${{ inputs.mobile == 'android' && inputs.release-id != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag_ref="${{ inputs.ref }}"
          tag_name="${tag_ref#refs/tags/}"
          gh release upload "$tag_name" "$RUNNER_TEMP"/android-release-assets/* --clobber

      - name: Upload Android Artifacts
        if: ${{ inputs.upload-artifacts && inputs.mobile == 'android' && inputs.release-id == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_android${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Upload Release Metadata Artifacts
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}${{ inputs.mobile && format('_{0}', inputs.mobile) || '' }}_release_metadata
          path: ${{ runner.temp }}/release-metadata/*
          retention-days: 14
          compression-level: 6
          if-no-files-found: warn

      - name: Upload Windows Artifacts
        if: ${{ inputs.upload-artifacts && startsWith(inputs.platform, 'windows') && inputs.release-id == '' && inputs.mobile == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/target/${{ inputs.target || 'release' }}/bundle/**/*.exe
            src-tauri/target/${{ inputs.target || 'release' }}/release/bundle/**/*.exe
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Upload Linux/macOS Artifacts
        if: ${{ inputs.upload-artifacts && !startsWith(inputs.platform, 'windows') && inputs.release-id == '' && inputs.mobile == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}_artifacts
          path: |
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.rpm
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.deb
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.AppImage
            src-tauri/target/${{ inputs.target || 'release' }}/**/*.dmg
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Collect failure diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail

          diagnostics_dir="$RUNNER_TEMP/failure-diagnostics"
          mkdir -p "$diagnostics_dir"

          {
            echo "platform=${{ inputs.platform }}"
            echo "target=${{ inputs.target }}"
            echo "mobile=${{ inputs.mobile }}"
            echo "ref=${{ inputs.ref }}"
            echo "sha=$GITHUB_SHA"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
          } > "$diagnostics_dir/build-context.txt"

          {
            echo "## Disk"
            df -h
            echo
            echo "## Workspace sizes"
            du -sh dist src-tauri/target src-tauri/gen/android 2>/dev/null || true
          } > "$diagnostics_dir/storage.txt"

          {
            echo "## Toolchain"
            rustc --version || true
            cargo --version || true
            bun --version || true
            bun run tauri --version || true
          } > "$diagnostics_dir/toolchain.txt"

      - name: Upload failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.asset-prefix }}_${{ inputs.platform }}${{ inputs.target && format('_{0}', inputs.target) || '' }}${{ inputs.mobile && format('_{0}', inputs.mobile) || '' }}_failure_diagnostics
          path: |
            ${{ runner.temp }}/failure-diagnostics/**
            dist/**
            src-tauri/target/**/build/*/output
            src-tauri/target/**/build/*/stderr
            src-tauri/target/**/build/*/stdout
            src-tauri/target/**/bundle/**/*.log
            src-tauri/gen/android/app/build/reports/**
            src-tauri/gen/android/app/build/outputs/logs/**
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn
