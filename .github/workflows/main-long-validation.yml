name: Main Long Validation

on:
  push:
    branches:
      - main
  schedule:
    - cron: '37 8 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  color-lab-full:
    name: 'color: full reference lab no-cache'
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Execute full color lab without cache
        shell: bash
        run: |
          set -euo pipefail
          graph_fingerprint="$(git ls-files -s src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/src/color src-tauri/src/raw src-tauri/src/render src-tauri/src/export src-tauri/crates/rapidraw-color-reference | shasum -a 256 | cut -d ' ' -f 1)"
          cargo run --locked --manifest-path src-tauri/Cargo.toml -p rapidraw-color-reference --bin rapidraw-color-lab -- \
            run --full --no-cache --graph "$graph_fingerprint" --output artifacts/color-lab-full
          jq -e \
            --arg graph "$graph_fingerprint" \
            '.contract_id == "rapidraw.color-lab.v1" and .tier == "full" and .passed == true and .cache == "bypassed" and .cache_identity.graph_fingerprint == $graph' \
            artifacts/color-lab-full/color-lab-report.json

      - name: Upload full color lab reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: color-lab-full-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/color-lab-full/**
          retention-days: 30
          if-no-files-found: error

  rust-clippy:
    name: 'rust: clippy baseline Linux'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Tauri Linux dependencies
        uses: ./.github/actions/install-tauri-linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-clippy-main-long
          cache-on-failure: true

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --no-default-features --features required-ci -- -D warnings -W clippy::redundant_clone

  rust-test:
    name: 'rust: tests Linux'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Tauri Linux dependencies
        uses: ./.github/actions/install-tauri-linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-test-main-long
          cache-on-failure: true

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --quiet --locked --all-targets --no-default-features --features required-ci,tauri-test --no-fail-fast

  main-macos-app-build:
    name: macOS app no-bundle smoke
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false
          rustflags: ''
          rust-src-dir: src-tauri
          target: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-main-smoke-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: main-smoke-onnx-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-

      - name: Record macOS smoke cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.main-smoke-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### macOS smoke cache status"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Rust cache key suffix: \`v1-main-smoke-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-bun-deps

      - id: tauri-build
        name: Build app smoke
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --ci --bundles app --target aarch64-apple-darwin --features required-ci,validation-harness
          retryAttempts: 3

      - name: Verify optimized validation app layout
        run: |
          find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 3 -print
          test -d src-tauri/target/aarch64-apple-darwin/release/bundle/macos/RapidRAW.app
          test -f src-tauri/target/aarch64-apple-darwin/release/bundle/macos/RapidRAW.app.tar.gz

      - name: Upload optimized validation app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main-native-startup-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/RapidRAW.app.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Collect smoke failure diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail

          diagnostics_dir="$RUNNER_TEMP/failure-diagnostics"
          mkdir -p "$diagnostics_dir"

          {
            echo "job=macOS app no-bundle smoke"
            echo "target=aarch64-apple-darwin"
            echo "sha=$GITHUB_SHA"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
          } > "$diagnostics_dir/build-context.txt"

          {
            echo "## Disk"
            df -h
            echo
            echo "## Workspace sizes"
            du -sh dist src-tauri/target 2>/dev/null || true
          } > "$diagnostics_dir/storage.txt"

          {
            echo "## Toolchain"
            rustc --version || true
            cargo --version || true
            bun --version || true
            bun run tauri --version || true
          } > "$diagnostics_dir/toolchain.txt"

      - name: Upload smoke failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main_macos_smoke_failure_diagnostics
          path: |
            ${{ runner.temp }}/failure-diagnostics/**
            dist/**
            src-tauri/target/**/build/*/output
            src-tauri/target/**/build/*/stderr
            src-tauri/target/**/build/*/stdout
            src-tauri/target/**/bundle/**/*.log
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

  main-macos-startup-runtime:
    name: macOS app startup runtime
    needs: main-macos-app-build
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && needs.main-macos-app-build.result == 'success' }}
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-bun-deps

      - name: Download optimized validation binary on a clean runtime runner
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: main-native-startup-${{ github.run_id }}-${{ github.run_attempt }}
          path: native-startup

      - name: Run bounded native startup benchmark
        env:
          RAWENGINE_STARTUP_HARDWARE_CLASS: github-hosted-macos-arm64
        run: |
          tar -xzf native-startup/RapidRAW.app.tar.gz -C native-startup
          test -x native-startup/RapidRAW.app/Contents/MacOS/RapidRAW
          xattr -cr native-startup/RapidRAW.app
          codesign --force --deep --sign - --timestamp=none native-startup/RapidRAW.app
          codesign --verify --deep --strict native-startup/RapidRAW.app
          bun scripts/benchmarks/startup-native.ts --binary native-startup/RapidRAW.app/Contents/MacOS/RapidRAW --pairs 30
