name: Main Long Validation

on:
  push:
    branches:
      - main
  schedule:
    - cron: '37 8 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  rust-check:
    name: 'rust: cargo check Linux'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Tauri Linux dependencies
        uses: ./.github/actions/install-tauri-linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-check-main-long
          cache-on-failure: true

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --locked --no-default-features --features required-ci

  rust-clippy:
    name: 'rust: clippy baseline Linux'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Tauri Linux dependencies
        uses: ./.github/actions/install-tauri-linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-clippy-main-long
          cache-on-failure: true

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --no-default-features --features required-ci -- -D warnings

  rust-test:
    name: 'rust: tests Linux'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Tauri Linux dependencies
        uses: ./.github/actions/install-tauri-linux-deps

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-rust-test-main-long
          cache-on-failure: true

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --quiet --locked --all-targets --no-default-features --features required-ci --no-fail-fast

  main-macos-app-build:
    name: macOS app no-bundle smoke
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: false
          rustflags: ''
          rust-src-dir: src-tauri
          target: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-main-smoke-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop
          cache-on-failure: true

      - name: Cache ONNX Runtime library
        id: main-smoke-onnx-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src-tauri/resources/libonnxruntime.dylib
          key: v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-${{ hashFiles('src-tauri/build.rs') }}
          restore-keys: |
            v1-${{ runner.os }}-${{ runner.arch }}-onnxruntime-aarch64-apple-darwin-desktop-

      - name: Record macOS smoke cache status
        run: |
          set -euo pipefail

          onnx_cache_hit="${{ steps.main-smoke-onnx-cache.outputs.cache-hit }}"
          if [[ -z "$onnx_cache_hit" ]]; then
            onnx_cache_hit="miss"
          fi

          {
            echo "### macOS smoke cache status"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Rust cache key suffix: \`v1-main-smoke-${{ runner.os }}-${{ runner.arch }}-aarch64-apple-darwin-desktop\`"
            echo "- ONNX exact hit: \`$onnx_cache_hit\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install frontend dependencies
        uses: ./.github/actions/setup-bun-deps

      - id: tauri-build
        name: Build no-bundle app smoke
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --ci --no-bundle --target aarch64-apple-darwin
          retryAttempts: 3

      - name: Collect smoke failure diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail

          diagnostics_dir="$RUNNER_TEMP/failure-diagnostics"
          mkdir -p "$diagnostics_dir"

          {
            echo "job=macOS app no-bundle smoke"
            echo "target=aarch64-apple-darwin"
            echo "sha=$GITHUB_SHA"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
          } > "$diagnostics_dir/build-context.txt"

          {
            echo "## Disk"
            df -h
            echo
            echo "## Workspace sizes"
            du -sh dist src-tauri/target 2>/dev/null || true
          } > "$diagnostics_dir/storage.txt"

          {
            echo "## Toolchain"
            rustc --version || true
            cargo --version || true
            bun --version || true
            bun run tauri --version || true
          } > "$diagnostics_dir/toolchain.txt"

      - name: Upload smoke failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main_macos_smoke_failure_diagnostics
          path: |
            ${{ runner.temp }}/failure-diagnostics/**
            dist/**
            src-tauri/target/**/build/*/output
            src-tauri/target/**/build/*/stderr
            src-tauri/target/**/build/*/stdout
            src-tauri/target/**/bundle/**/*.log
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn
