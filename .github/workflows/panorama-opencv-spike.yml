name: Rust Feature Matrix

on:
  schedule:
    - cron: '17 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-opencv-spike:
    name: macOS all-features check
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          rustflags: ''
          rust-src-dir: src-tauri

      - name: Install OpenCV build dependencies
        run: brew install opencv llvm pkg-config

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: v1-${{ runner.os }}-${{ runner.arch }}-panorama-opencv-spike
          cache-on-failure: true

      - name: Record OpenCV environment
        run: |
          set -euo pipefail

          opencv_prefix="$(brew --prefix opencv)"
          llvm_prefix="$(brew --prefix llvm)"
          export PKG_CONFIG_PATH="$opencv_prefix/lib/pkgconfig"

          {
            echo "### OpenCV spike environment"
            echo "- OpenCV prefix: \`$opencv_prefix\`"
            echo "- LLVM prefix: \`$llvm_prefix\`"
            echo "- pkg-config: \`$(pkg-config --version)\`"
            echo "- OpenCV version: \`$(pkg-config --modversion opencv4)\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cargo check all features
        working-directory: src-tauri
        env:
          LIBCLANG_PATH: ${{ runner.temp }}/unused
        run: |
          set -euo pipefail

          opencv_prefix="$(brew --prefix opencv)"
          llvm_prefix="$(brew --prefix llvm)"
          export PKG_CONFIG_PATH="$opencv_prefix/lib/pkgconfig"
          export LIBCLANG_PATH="$llvm_prefix/lib"

          cargo check --locked --all-targets --all-features

      - name: Cargo test OpenCV feature
        working-directory: src-tauri
        env:
          LIBCLANG_PATH: ${{ runner.temp }}/unused
        run: |
          set -euo pipefail

          opencv_prefix="$(brew --prefix opencv)"
          llvm_prefix="$(brew --prefix llvm)"
          export PKG_CONFIG_PATH="$opencv_prefix/lib/pkgconfig"
          export LIBCLANG_PATH="$llvm_prefix/lib"

          cargo test --locked --all-targets --all-features opencv_spike -- --nocapture
