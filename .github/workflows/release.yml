name: 'Release: Build & Package App'

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to build.
        required: true
        default: main
  release:
    types: [created]

jobs:
  release-notes:
    name: Generate release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Bun dependencies
        uses: ./.github/actions/setup-bun-deps

      - name: Collect merged pull requests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state merged \
            --base main \
            --limit 100 \
            --json number,title,mergedAt,url,author,labels \
            > "$RUNNER_TEMP/merged-pull-requests.json"

      - name: Generate release notes
        run: |
          set -euo pipefail

          bun run release:notes -- \
            --input "$RUNNER_TEMP/merged-pull-requests.json" \
            --output "$RUNNER_TEMP/release-notes.md" \
            --title "RapidRaw ${GITHUB_REF_NAME} release notes"

          cat "$RUNNER_TEMP/release-notes.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release notes artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes
          path: ${{ runner.temp }}/release-notes.md
          if-no-files-found: error

      - name: Attach release notes to release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release upload \
            "$GITHUB_REF_NAME" \
            "$RUNNER_TEMP/release-notes.md#Release notes" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--bundles nsis'
            target: ''
            asset-prefix: '01'
          - platform: 'windows-11-arm'
            args: '--bundles nsis'
            target: 'aarch64-pc-windows-msvc'
            asset-prefix: '01'
          - platform: 'macos-14'
            target: aarch64-apple-darwin
            asset-prefix: '02'
          - platform: 'macos-15-intel'
            target: x86_64-apple-darwin
            asset-prefix: '02'
          - platform: 'ubuntu-22.04'
            target: ''
            asset-prefix: '03'
          - platform: 'ubuntu-22.04-arm'
            target: ''
            asset-prefix: '03'
          - platform: 'ubuntu-24.04'
            target: ''
            asset-prefix: '03'
          - platform: 'ubuntu-24.04-arm'
            target: ''
            asset-prefix: '03'
          - platform: 'ubuntu-latest'
            mobile: 'android'
            target: 'aarch64-linux-android'
            args: '--target aarch64'
            asset-prefix: '04'
    uses: ./.github/workflows/build.yml
    with:
      release-id: ${{ github.event.release.id || '' }}
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      asset-name-pattern: '[name]_v[version]_[platform]_[arch][ext]'
      asset-prefix: ${{ matrix.asset-prefix }}
      mobile: ${{ matrix.mobile }}
      ref: ${{ inputs.ref || github.ref }}
      upload-artifacts: true
    secrets: inherit
    permissions:
      contents: write
