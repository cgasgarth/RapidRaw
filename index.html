<!doctype html>
<html lang="en" class="overscroll-none">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RapidRAW</title>
    <style>
      /* Bootstrap chrome is intentionally self-contained: it paints before the
         application bundle, settings, GPU, and library services are ready. */
      #startup-shell {
        align-items: stretch;
        background: #0e1014;
        color: #d9dce3;
        display: grid;
        font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        grid-template-columns: 220px 1fr;
        height: 100%;
      }
      #startup-shell aside {
        background: #15181e;
        border-right: 1px solid #272b34;
        padding: 22px 14px;
      }
      #startup-shell strong { display: block; font-size: 15px; margin: 0 10px 24px; }
      #startup-shell nav span {
        border-radius: 7px;
        display: block;
        margin: 4px 0;
        padding: 9px 10px;
      }
      #startup-shell nav span:first-child { background: #282d37; }
      #startup-shell main { display: grid; grid-template-rows: 52px 1fr; }
      #startup-shell header { border-bottom: 1px solid #272b34; padding: 17px 20px; }
      #startup-shell section { display: grid; place-items: center; color: #8e95a3; }
      #startup-shell button {
        background: #282d37;
        border: 1px solid #3a404c;
        border-radius: 7px;
        color: #d9dce3;
        cursor: pointer;
        margin: 8px 4px 0;
        padding: 8px 12px;
      }
      #startup-shell [role="alert"] { color: #f4b4b4; max-width: 420px; }
      html, body, #root { height: 100%; margin: 0; }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="startup-shell" role="status" aria-label="RapidRAW library is starting">
        <aside>
          <strong>RapidRAW</strong>
          <nav aria-label="Workspace"><span>Library</span><span>Albums</span><span>Folders</span></nav>
        </aside>
        <main>
          <header>Library</header>
          <section>
            <div id="startup-shell-content">
              <p>Loading your workspace…</p>
              <button id="startup-add-folder" type="button">Add Folder</button>
              <button id="startup-settings" type="button">Settings</button>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script data-rawengine-startup-preboot>
      // WKWebView can defer module evaluation while its module loader starts.
      // This dependency-free preboot makes the painted shell interactive and
      // completes the native handshake during HTML parsing instead.
      (() => {
        const state = { intent: null, receipt: null };
        window.__RAWENGINE_STATIC_STARTUP__ = state;
        document.getElementById("startup-add-folder").addEventListener("click", () => { state.intent = "add-folder"; });
        document.getElementById("startup-settings").addEventListener("click", () => { state.intent = "settings"; });
        const bridge = async () => {
          const deadline = Date.now() + 2000;
          while (!window.__TAURI_INTERNALS__?.invoke) {
            if (Date.now() >= deadline) throw new Error("startup_tauri_bridge_unavailable");
            await new Promise((resolve) => setTimeout(resolve, 0));
          }
          return window.__TAURI_INTERNALS__.invoke;
        };
        state.receipt = bridge().then(async (invoke) => {
          const frontendReadyStartedAt = performance.now();
          await invoke("frontend_ready");
          const frontendReadyMs = Math.ceil(performance.now() - frontendReadyStartedAt);
          const snapshot = await invoke("get_startup_trace");
          if (typeof snapshot?.traceId !== "string" || !snapshot.traceId.startsWith("startup:")) {
            throw new Error("startup_trace_invalid_identity");
          }
          if (!Number.isInteger(snapshot.processId) || snapshot.processId <= 0) {
            throw new Error("startup_trace_invalid_process");
          }
          const record = async (phase, detail) => {
            const response = await invoke("record_frontend_startup_phase", {
              detail, phase, status: "ok", traceId: snapshot.traceId,
            });
            if (response?.traceId !== snapshot.traceId) throw new Error("startup_trace_correlation_mismatch");
          };
          await record("shellVisible", `static-library-shell-visible:frontend_ready_ms=${frontendReadyMs}`);
          await record("interactive", "static-shell-handlers-and-ipc-ready");
          return snapshot.traceId;
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
